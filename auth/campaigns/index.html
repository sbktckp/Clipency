function hideCampDetail(){
  document.getElementById('camp-grid').classList.remove('hidden');
  document.getElementById('camp-detail').classList.add('hidden');
}

/* ── CHART ── */
let _detailPeriod='7d', _detailSparkData=null, _detailColor='#C4956A', _detailAnimRAF=null;
const DETAIL_PERIOD_DATA={
  '7d':{labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun']},
  '30d':{labels:['Wk 1','Wk 2','Wk 3','Wk 4','Wk 5']},
  '90d':{labels:['Jan','Feb','Mar']},
};

function drawDetailChart(sparkData, color){
  if(sparkData) _detailSparkData=sparkData;
  if(color) _detailColor=color;
  const canvas=document.getElementById('detail-line-chart'); if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth||500, H=160;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  canvas.width=W*dpr; canvas.height=H*dpr;
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const base=_detailSparkData||[40,55,35,70,60,85,90];
  let vals;
  if(_detailPeriod==='7d') vals=base;
  else if(_detailPeriod==='30d') vals=[base[0],base[1]+base[2],base[3]+base[4],base[5],base[6]+base[5]];
  else vals=[base[0]+base[1],base[2]+base[3]+base[4],base[5]+base[6]];
  const labels=DETAIL_PERIOD_DATA[_detailPeriod].labels;
  const n=vals.length, maxV=Math.max(...vals)*1.18||1;
  const pad={l:48,r:18,t:18,b:28}, cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=3;i++){
    const y=pad.t+cH-(cH/3)*i;
    ctx.beginPath(); ctx.strokeStyle='rgba(242,237,232,0.05)'; ctx.lineWidth=1;
    ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='rgba(106,97,88,0.85)'; ctx.font='9px DM Sans'; ctx.textAlign='right';
    ctx.fillText(Math.round((maxV/3)*i),pad.l-7,y+3);
  }
  const pts=vals.map((v,i)=>({x:pad.l+(n===1?cW/2:(i/(n-1))*cW),y:pad.t+cH-(v/maxV)*cH}));
  const g=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);
  g.addColorStop(0,_detailColor+'33'); g.addColorStop(1,_detailColor+'00');
  ctx.beginPath(); ctx.moveTo(pts[0].x,pad.t+cH);
  pts.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.lineTo(pts[pts.length-1].x,pad.t+cH);
  ctx.closePath(); ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=_detailColor; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();
  pts.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle=_detailColor; ctx.fill();
    ctx.strokeStyle='#0A0908'; ctx.lineWidth=2; ctx.stroke();
  });
  // X labels
  const xl=document.getElementById('detail-x-labels');
  if(xl) xl.innerHTML=labels.map(l=>`<span style="font-size:9px;color:rgba(106,97,88,0.85);font-family:'DM Sans';">${l}</span>`).join('');
  canvas._pts=pts; canvas._vals=vals; canvas._labels=labels;
}

function switchDetailPeriod(p){
  _detailPeriod=p;
  document.querySelectorAll('.chart-period-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('dper-'+p); if(btn) btn.classList.add('active');
  drawDetailChart();
}

function initDetailHover(){
  const canvas=document.getElementById('detail-line-chart'); if(!canvas) return;
  canvas.onmousemove=function(e){
    const r=this.getBoundingClientRect(), mx=e.clientX-r.left;
    const pts=this._pts||[], tip=document.getElementById('detail-chart-tooltip');
    if(!tip) return;
    let cl=null, md=40;
    pts.forEach((p,i)=>{ const d=Math.abs(p.x-mx); if(d<md){md=d;cl={p,i};} });
    if(cl){
      const v=(this._vals||[])[cl.i], l=(this._labels||[])[cl.i];
      tip.textContent=`${l}: ${v>=1?v.toFixed(1)+'K':'0'}`;
      tip.style.display='block';
      tip.style.left=Math.min(cl.p.x+10,this.clientWidth-120)+'px';
      tip.style.top=(cl.p.y-36)+'px';
    } else { tip.style.display='none'; }
  };
  canvas.onmouseleave=()=>{ const t=document.getElementById('detail-chart-tooltip'); if(t) t.style.display='none'; };
}

/* ── SUBMIT MODAL ── */
function openSubmitModal(campId){
  _submitCampId=campId;
  const c=CAMPAIGNS.find(x=>String(x.id)===String(campId)); if(!c) return;
  document.getElementById('sm-camp-title').textContent=c.title;
  document.getElementById('sm-camp-sub').textContent='Platform · '+c.platforms.join(' / ');
  document.getElementById('sm-handle').value='';
  document.getElementById('sm-url').value='';
  document.getElementById('sm-err').style.display='none';
  document.getElementById('sm-steps').classList.remove('hidden');
  document.getElementById('sm-success').classList.add('hidden');
  const pg=document.getElementById('sm-platforms');
  pg.innerHTML=c.platforms.map((p,i)=>`<button class="plat-btn${i===0?' active':''}" data-plat="${esc(p)}" onclick="selectPlatform(this)">${esc(p)}</button>`).join('');
  document.getElementById('submit-modal').classList.remove('hidden');
}
function closeSubmitModal(){ document.getElementById('submit-modal').classList.add('hidden'); }
document.getElementById('submit-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeSubmitModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSubmitModal(); });
function selectPlatform(btn){ document.querySelectorAll('.plat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
async function confirmSubmit(){
  const platBtn=document.querySelector('.plat-btn.active');
  const platform=platBtn?platBtn.dataset.plat:'Instagram';
  const handle=document.getElementById('sm-handle').value.trim().replace(/^@/,'');
  const url=document.getElementById('sm-url').value.trim();
  const err=document.getElementById('sm-err');
  err.style.display='none';
  if(!handle){ err.textContent='Enter your handle.'; err.style.display='block'; return; }
  if(!url||!url.startsWith('http')){ err.textContent='Enter a valid clip URL.'; err.style.display='block'; return; }
  const btn=document.getElementById('sm-submit-btn'); btn.disabled=true; btn.textContent='Submitting…';
  try{
    const sb=getSb(); if(!sb) throw new Error('no supabase');
    const c=CAMPAIGNS.find(x=>String(x.id)===String(_submitCampId));
    const{error}=await sb.from('clip_submissions').insert([{
      user_id:currentUser.id, campaign_id:_submitCampId,
      campaign_title:c?.title||'', platform, handle, clip_url:url,
      status:'pending', views:0, views_count:0, created_at:new Date().toISOString(),
    }]);
    if(error) throw error;
    document.getElementById('sm-steps').classList.add('hidden');
    document.getElementById('sm-success').classList.remove('hidden');
    setTimeout(closeSubmitModal, 2500);
  }catch(e){ err.textContent=e.message; err.style.display='block'; btn.disabled=false; btn.textContent='Submit Clip →'; }
}

styleEl.textContent=`.spin{width:18px;height:18px;border:2px solid var(--s4);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}`;
document.head.appendChild(styleEl);
</script>
