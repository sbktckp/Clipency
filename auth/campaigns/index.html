<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clipency | Campaigns</title>
<style id="auth-hide">body{visibility:hidden!important;}</style>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0A0908;--s1:#111009;--s2:#181410;--s3:#221D18;--s4:#332B23;
  --amber:#C4956A;--amber2:#D4A57A;--adim:rgba(196,149,106,.1);--aglow:rgba(196,149,106,.06);
  --green:#6EE7B7;--red:#F87171;
  --tp:#F5F0EB;--ts:#B8AFA8;--tm:#6A6158;
  --border:rgba(196,149,106,.18);--bsoft:rgba(242,237,232,.065);
  --sw:256px;
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease-out:cubic-bezier(0.16,1,0.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tp);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;}
#app{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sw);flex-shrink:0;background:var(--s1);border-right:1px solid var(--bsoft);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
  transition:transform .3s var(--ease-out);
  z-index:200;
}

/* Sidebar toggle button */
.sb-toggle{
  display:none;position:fixed;top:16px;left:16px;z-index:250;
  width:40px;height:40px;border-radius:10px;
  border:1px solid var(--bsoft);background:var(--s2);
  color:var(--ts);cursor:pointer;
  align-items:center;justify-content:center;
  transition:all .25s var(--ease-out);
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.sb-toggle:hover{border-color:var(--border);color:var(--amber);background:var(--s3);}
.sb-toggle .hamburger-line{
  display:block;width:18px;height:2px;background:currentColor;
  border-radius:1px;transition:all .3s var(--ease-out);
  position:relative;
}
.sb-toggle .hamburger-line::before,
.sb-toggle .hamburger-line::after{
  content:'';display:block;width:18px;height:2px;background:currentColor;
  border-radius:1px;position:absolute;left:0;
  transition:all .3s var(--ease-out);
}
.sb-toggle .hamburger-line::before{top:-6px;}
.sb-toggle .hamburger-line::after{top:6px;}

/* Hamburger → X animation */
.sb-toggle.active .hamburger-line{background:transparent;}
.sb-toggle.active .hamburger-line::before{top:0;transform:rotate(45deg);}
.sb-toggle.active .hamburger-line::after{top:0;transform:rotate(-45deg);}

/* Overlay behind sidebar on mobile */
.sb-overlay{
  display:none;position:fixed;inset:0;z-index:190;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  opacity:0;transition:opacity .3s;
}
.sb-overlay.visible{display:block;opacity:1;}
.sb-logo{padding:18px 14px 16px;border-bottom:1px solid var(--bsoft);display:flex;align-items:center;justify-content:center;}
.sb-logo-img{
  height:26px;width:auto;object-fit:contain;
  transition:opacity .2s;
}
.sb-logo-img:hover{opacity:.85;}
.sb-nav{flex:1;overflow-y:auto;padding:16px 10px;}
.sb-nav::-webkit-scrollbar{width:0;}
.nav-label{
  font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--tm);padding:18px 12px 6px;
  opacity:.65;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  width:100%;padding:11px 13px;border-radius:11px;
  border:none;background:transparent;color:var(--ts);
  cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:.91rem;font-weight:500;
  transition:all .22s var(--ease-out);
  text-align:left;position:relative;letter-spacing:-.01em;
}
.nav-item:hover{
  background:var(--adim);color:var(--tp);
  box-shadow:0 2px 10px rgba(196,149,106,.06);
  transform:translateX(1px);
}
.nav-item.active{
  background:linear-gradient(90deg,rgba(196,149,106,.14),rgba(196,149,106,.06));
  color:var(--amber);
  box-shadow:0 2px 12px rgba(196,149,106,.1);
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:18%;bottom:18%;
  width:2.5px;background:var(--amber);border-radius:0 3px 3px 0;
  box-shadow:0 0 8px rgba(196,149,106,.5);
}
.nav-icon{
  width:20px;height:20px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;opacity:.65;
  transition:opacity .2s,transform .25s var(--ease-spring);
}
.nav-item.active .nav-icon{opacity:1;}
.nav-item:hover .nav-icon{opacity:1;transform:scale(1.1);}
/* Amber dot badge for active items */
.nav-active-dot{
  margin-left:auto;width:5px;height:5px;border-radius:50%;
  background:var(--amber);opacity:0;
  transition:opacity .2s;flex-shrink:0;
}
.nav-item.active .nav-active-dot{opacity:.7;}

.curr-wrap{padding:10px;border-top:1px solid var(--bsoft);}
.curr-toggle{
  display:flex;align-items:center;gap:9px;
  width:100%;padding:10px 13px;border-radius:10px;
  border:1px solid var(--bsoft);background:var(--s2);
  color:var(--ts);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.87rem;
  transition:all .2s;
}
.curr-toggle:hover{border-color:var(--border);color:var(--tp);background:var(--s3);}
.curr-menu{
  position:absolute;bottom:58px;left:10px;width:226px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:13px;overflow:hidden;z-index:100;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}
.curr-opt{
  display:flex;align-items:center;gap:9px;
  width:100%;padding:11px 16px;border:none;
  background:transparent;color:var(--ts);
  cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:.86rem;transition:background .15s;
}
.curr-opt:hover{background:var(--adim);}
.curr-opt.active{color:var(--amber);background:rgba(196,149,106,.06);}
.curr-rate{margin-left:auto;font-family:'Space Mono',monospace;font-size:.66rem;color:var(--tm);}
.curr-rate.loading{opacity:.4;animation:cm-pulse 1.2s ease infinite;}
.hidden{display:none!important;}
.sb-profile{
  padding:11px 10px;border-top:1px solid var(--bsoft);
  display:flex;align-items:center;gap:10px;
}
.sb-av{
  width:36px;height:36px;border-radius:10px;
  background:var(--adim);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Instrument Serif',serif;font-size:1rem;
  color:var(--amber);flex-shrink:0;
  transition:box-shadow .2s;
}
.sb-av:hover{box-shadow:0 0 0 3px rgba(196,149,106,.15);}
.sb-info{flex:1;min-width:0;}
.sb-name{font-size:.86rem;font-weight:600;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-role{font-size:.69rem;color:var(--tm);}
.sb-signout{padding:7px;border-radius:7px;border:none;background:transparent;color:var(--tm);cursor:pointer;transition:all .2s;display:flex;}
.sb-signout:hover{color:var(--red);background:rgba(248,113,113,.1);}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;background:var(--bg);}
.main::-webkit-scrollbar{width:5px;}
.main::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px;}
.section{display:none;padding:28px 28px;max-width:1600px;min-height:100vh;animation:sectIn .35s var(--ease-out);}
.section.active{display:block;}
@keyframes sectIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.pg-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;}
.pg-eyebrow{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);margin-bottom:3px;}
.pg-title{font-family:'Instrument Serif',serif;font-size:2.1rem;color:var(--tp);font-weight:400;line-height:1.1;}
.user-chip{display:flex;align-items:center;gap:9px;background:var(--s2);border:1px solid var(--bsoft);border-radius:100px;padding:5px 15px 5px 7px;transition:border-color .2s;}
.user-chip:hover{border-color:var(--border);}
.uc-av{width:26px;height:26px;border-radius:50%;background:var(--adim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--amber);}
.uc-name{font-size:.78rem;font-weight:500;color:var(--ts);}

/* ── CARDS ── */
.card{background:var(--s2);border:1px solid var(--bsoft);border-radius:16px;padding:28px;transition:border-color .2s;}
.card:hover{border-color:var(--border);}
.card-amber{border-color:var(--border);}
.card-amber::before{content:'';display:block;height:1px;background:linear-gradient(90deg,transparent,var(--amber),transparent);margin:-24px -24px 24px;}

/* ── FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:6px;margin-bottom:28px;flex-wrap:wrap;}
.filter-btn{padding:6px 15px;border-radius:100px;border:1px solid var(--bsoft);background:transparent;color:var(--ts);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;transition:all .2s;}
.filter-btn:hover{border-color:var(--border);color:var(--tp);}
.filter-btn.active{background:var(--adim);border-color:var(--border);color:var(--amber);}
.camp-count{margin-left:auto;font-family:'Space Mono',monospace;font-size:.68rem;color:var(--tm);}

/* ── CAMPAIGN GRID ── */
.camp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}

/* ── CAMPAIGN CARD — REDESIGNED ── */
.camp-card{
  background:var(--s2);border:1px solid var(--bsoft);border-radius:18px;
  cursor:pointer;transition:all .3s var(--ease-out);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}
.camp-card:hover{
  border-color:var(--border);
  transform:translateY(-4px);
  box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 0 1px var(--border);
}
.camp-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--amber),transparent);
  opacity:0;transition:opacity .3s;
}
.camp-card:hover::after{opacity:0.8;}

/* Card header */
.cc-header{padding:16px 14px 0;display:flex;align-items:flex-start;gap:10px;}
.cc-icon{
  width:44px;height:44px;border-radius:12px;
  background:var(--adim);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;
  transition:transform .3s var(--ease-spring);
}
.camp-card:hover .cc-icon{transform:scale(1.08) rotate(-4deg);}
.cc-title-wrap{flex:1;min-width:0;}
.cc-title{font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;color:var(--tp);margin-bottom:5px;line-height:1.3;letter-spacing:-.01em;}
.cc-tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{display:inline-block;padding:2px 9px;border-radius:100px;background:var(--adim);border:1px solid var(--border);font-size:.68rem;font-weight:600;color:var(--amber);letter-spacing:.02em;}
.tag-green{background:rgba(110,231,183,.1);border-color:rgba(110,231,183,.2);color:var(--green);}
.tag-new{background:rgba(110,231,183,.08);border-color:rgba(110,231,183,.15);color:var(--green);}

/* Campaign banner area */
.cc-banner{
  margin:12px 14px 0;
  height:120px;
  border-radius:10px;
  overflow:hidden;
  background:linear-gradient(135deg,rgba(22,18,14,0.95),rgba(34,29,24,0.8));
  border:1px solid rgba(196,149,106,0.12);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  flex-shrink:0;
}
.cc-banner img{width:100%;height:100%;object-fit:cover;display:block;}
.cc-banner-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  opacity:.35;
}
.cc-banner-placeholder svg{color:var(--amber);}
.cc-banner-placeholder span{font-family:'Space Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.14em;color:var(--amber);}

/* KPI row */
.cc-kpi{padding:12px 14px 0;display:flex;gap:7px;}
.cc-kpi-item{
  flex:1;position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(34,29,24,0.9),rgba(24,20,16,0.6));
  border:1px solid rgba(196,149,106,0.12);
  border-radius:12px;padding:13px 14px;
  backdrop-filter:blur(12px);
  transition:all .3s var(--ease-out);
}
.cc-kpi-item::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,149,106,0.5),transparent);
  opacity:0;transition:opacity .3s;
}
.camp-card:hover .cc-kpi-item::before{opacity:1;}
.cc-kpi-item:hover{
  background:linear-gradient(135deg,rgba(44,38,30,0.95),rgba(30,25,19,0.8));
  border-color:rgba(196,149,106,0.25);
  transform:translateY(-1px);
}
.cc-kpi-label{font-family:'Space Mono',monospace;font-size:.54rem;text-transform:uppercase;letter-spacing:.14em;color:var(--tm);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.cc-kpi-val{font-size:.95rem;font-weight:700;color:var(--tp);letter-spacing:-.01em;}
.cc-kpi-val.amber{color:var(--amber);}
.cc-kpi-val.green{color:var(--green);}

/* Budget progress — hover reveal */
.cc-progress{
  margin:10px 18px 0;
  max-height:0;overflow:hidden;
  transition:max-height .4s var(--ease-out),opacity .3s;
  opacity:0;
}
.camp-card:hover .cc-progress{max-height:60px;opacity:1;}
.prog-label-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.prog-label{font-family:'Space Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--tm);}
.prog-pct{font-size:.72rem;font-weight:600;color:var(--amber);}
.prog-track{height:5px;background:var(--s4);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:var(--amber);width:0;transition:width .8s var(--ease-out) .1s;}
.camp-card:hover .prog-fill{width:var(--prog-w);}

/* Card footer */
.cc-footer{padding:10px 14px 14px;display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
.cc-creators{display:flex;align-items:center;gap:5px;}
.cc-creator-avatars{display:flex;}
.cc-creator-av{width:20px;height:20px;border-radius:50%;background:var(--s4);border:1.5px solid var(--s2);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--ts);margin-left:-6px;first-of-type:margin-left:0;}
.cc-creator-av:first-child{margin-left:0;}
.cc-creators-label{font-size:.75rem;color:var(--tm);}
.cc-creators-count{font-size:.75rem;font-weight:600;color:var(--ts);}
.cc-cta{font-size:.72rem;color:var(--amber);font-weight:600;display:flex;align-items:center;gap:3px;opacity:0;transform:translateX(-4px);transition:all .25s;}
.camp-card:hover .cc-cta{opacity:1;transform:translateX(0);}

/* ── CAMPAIGN DETAIL ── */
.detail-wrap{animation:sectIn .3s var(--ease-out);}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 15px;border-radius:9px;border:1px solid var(--bsoft);background:transparent;color:var(--ts);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;transition:all .2s;}
.back-btn:hover{border-color:var(--border);color:var(--tp);}
.detail-icon{
  width:52px;height:52px;border-radius:14px;
  background:var(--adim);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
}
.detail-title-wrap{flex:1;min-width:120px;}
.detail-title{font-family:'Instrument Serif',serif;font-size:1.4rem;color:var(--tp);margin-bottom:4px;line-height:1.2;}
.submit-btn{
  background:var(--amber);color:#0A0908;
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:.84rem;
  border:none;padding:11px 22px;border-radius:10px;cursor:pointer;
  transition:all .25s var(--ease-out);white-space:nowrap;flex-shrink:0;
}
.submit-btn:hover{background:var(--tp);transform:translateY(-2px);box-shadow:0 8px 24px rgba(196,149,106,.3);}

/* Detail layout — campaign left, chart right */
.camp-detail-top{display:grid;grid-template-columns:1fr 1.5fr;gap:16px;margin-bottom:16px;}
.detail-layout{display:grid;grid-template-columns:1fr 1.4fr;gap:20px;margin-bottom:16px;}
.detail-left{display:flex;flex-direction:column;gap:14px;}
.detail-right{display:flex;flex-direction:column;gap:14px;}

/* Views chart card */
.detail-chart-card{
  border-radius:14px;overflow:hidden;
  background:linear-gradient(135deg,rgba(34,29,24,0.9),rgba(24,20,16,0.6));
  border:1px solid rgba(196,149,106,0.12);
  position:relative;
  padding:20px 20px 14px;
  backdrop-filter:blur(12px);
}
.detail-chart-label{font-family:'Space Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.14em;color:var(--tm);}
.detail-chart-val{font-size:2rem;font-weight:700;color:var(--tp);line-height:1.1;letter-spacing:-.03em;margin-bottom:2px;}
.detail-chart-delta{font-size:.75rem;color:var(--green);display:flex;align-items:center;gap:3px;margin-bottom:14px;}
.detail-chart-svg{width:100%;height:90px;display:block;}

/* Banner slots */
.banner-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.banner-slot{
  aspect-ratio:16/7;border-radius:12px;
  background:var(--s2);border:1.5px dashed rgba(196,149,106,.25);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;cursor:pointer;transition:all .25s var(--ease-out);
  position:relative;overflow:hidden;
}
.banner-slot:hover{border-color:var(--amber);background:var(--adim);}
.banner-slot.filled{border-style:solid;border-color:var(--border);}
.banner-slot .bs-label{font-family:'Space Mono',monospace;font-size:.56rem;text-transform:uppercase;letter-spacing:.14em;color:var(--tm);}
.banner-slot .bs-icon{font-size:1.3rem;opacity:.5;}
.banner-slot:hover .bs-icon{opacity:.9;}
.banner-section-title{font-family:'Instrument Serif',serif;font-size:1.05rem;color:var(--tp);font-weight:400;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.banner-section-title span{font-family:'Space Mono',monospace;font-size:.56rem;text-transform:uppercase;letter-spacing:.14em;color:var(--tm);}

/* Detail KPI row — glassmorphism boxes matching campaign card style */
.detail-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.d-kpi{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(34,29,24,0.9),rgba(24,20,16,0.6));
  border:1px solid rgba(196,149,106,0.12);
  border-radius:14px;
  padding:18px 20px 16px;
  backdrop-filter:blur(12px);
  transition:all .3s var(--ease-out);
  cursor:default;
}
.d-kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,149,106,0.5),transparent);
  opacity:0;transition:opacity .3s;
}
.d-kpi:hover::before{opacity:1;}
.d-kpi:hover{
  background:linear-gradient(135deg,rgba(44,38,30,0.95),rgba(30,25,19,0.8));
  border-color:rgba(196,149,106,0.25);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.d-kpi-label{
  font-family:'Space Mono',monospace;
  font-size:.54rem;text-transform:uppercase;
  letter-spacing:.14em;color:var(--tm);
  margin-bottom:10px;
  display:flex;align-items:center;gap:4px;
}
.d-kpi-val{
  font-family:'DM Sans',sans-serif;
  font-size:1.6rem;font-weight:700;
  color:var(--tp);line-height:1;
  letter-spacing:-.03em;
  transition:color .2s;
}
.d-kpi-val.amber{color:var(--amber);}
.d-kpi-val.green{color:var(--green);}
.d-kpi-val.purple{color:#A78BFA;}
.d-kpi-val.blue{color:#60A5FA;}
.d-kpi-sub{font-size:.72rem;color:var(--tm);margin-top:5px;font-weight:500;}
.d-kpi-sub.green-txt{color:var(--green);}
.d-kpi-sub.amber-txt{color:var(--amber);}
@keyframes kpiIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.detail-kpi-row .d-kpi:nth-child(1){animation:kpiIn .35s var(--ease-out) .05s both;}
.detail-kpi-row .d-kpi:nth-child(2){animation:kpiIn .35s var(--ease-out) .1s both;}
.detail-kpi-row .d-kpi:nth-child(3){animation:kpiIn .35s var(--ease-out) .15s both;}
.detail-kpi-row .d-kpi:nth-child(4){animation:kpiIn .35s var(--ease-out) .2s both;}

/* Budget progress full-width card */
.budget-card{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(34,29,24,0.9),rgba(24,20,16,0.6));
  border:1px solid rgba(196,149,106,0.12);
  border-radius:14px;padding:22px 24px;
  margin-bottom:16px;
  backdrop-filter:blur(12px);
}
.budget-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,149,106,0.4),transparent);
}
.budget-card-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.budget-card-title{
  font-family:'DM Sans',sans-serif;
  font-size:.95rem;font-weight:600;color:var(--tp);
}
.budget-card-meta{
  font-family:'Space Mono',monospace;
  font-size:.65rem;color:var(--amber);
}
.budget-track{
  height:6px;background:var(--s4);
  border-radius:4px;overflow:hidden;
  margin-bottom:8px;
}
.budget-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--amber),var(--amber2));
  transition:width .8s var(--ease-out);
}
.budget-footnote{
  display:flex;align-items:center;justify-content:space-between;
  font-size:.75rem;
}
.budget-pct{color:var(--tm);font-weight:500;}
.budget-rpm{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--amber);}

/* Requirements — centered */
.req-list{list-style:none;}
.req-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 0;border-bottom:1px solid var(--bsoft);
  font-size:.84rem;color:var(--ts);
  font-weight:500;
  letter-spacing:.01em;
}
.req-item:last-child{border-bottom:none;}
.req-check{
  width:20px;height:20px;border-radius:6px;
  background:rgba(110,231,183,.12);border:1px solid rgba(110,231,183,.25);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.req-check svg{color:var(--green);}

/* Performers */
.perf-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--bsoft);}
.perf-item:last-child{border-bottom:none;}
.perf-rank{font-family:'Space Mono',monospace;font-size:.72rem;width:26px;color:var(--tm);}
.perf-rank.gold{color:#F0C040;}
.perf-rank.silver{color:#B0B8C0;}
.perf-rank.bronze{color:#CD7F32;}
.perf-av{width:30px;height:30px;border-radius:8px;background:var(--adim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--amber);}
.perf-name{font-size:.84rem;font-weight:500;color:var(--tp);}
.perf-handle{font-size:.72rem;color:var(--tm);}
.perf-views{font-size:.8rem;font-weight:600;color:var(--tp);text-align:right;}
.perf-earn{font-size:.72rem;color:var(--green);text-align:right;}

/* Campaign info card rows */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bsoft);}
.info-row:last-child{border-bottom:none;}
.info-label{
  font-family:'Space Mono',monospace;
  font-size:.54rem;text-transform:uppercase;
  letter-spacing:.12em;color:var(--tm);
}
.info-val{
  font-family:'DM Sans',sans-serif;
  font-size:.88rem;font-weight:700;
  color:var(--tp);
}
.info-val.amber{color:var(--amber);}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(34,29,24,0.9),rgba(24,20,16,0.6));
  border:1px solid rgba(196,149,106,0.12);
  border-radius:16px;padding:22px 20px 18px;
  backdrop-filter:blur(12px);
  transition:all .3s var(--ease-out);
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,149,106,0.5),transparent);
  opacity:0;transition:opacity .3s;
}
.stat-card:hover::before{opacity:1;}
.stat-card:hover{border-color:rgba(196,149,106,0.25);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.stat-label{font-family:'Space Mono',monospace;font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;color:var(--tm);margin-bottom:10px;}
.stat-value{font-family:'DM Sans',sans-serif;font-size:1.9rem;font-weight:700;color:var(--tp);line-height:1;letter-spacing:-.03em;margin-bottom:6px;}
.stat-value.amber{color:var(--amber);}
.stat-value.green{color:var(--green);}
.stat-value.yellow{color:#FACC15;}
.stat-delta{font-size:.73rem;color:var(--tm);}

/* ── STATS TABS ── */
.stats-tabs{display:flex;gap:0;margin-bottom:0;border-bottom:1px solid var(--bsoft);}
.stats-tab-btn{
  flex:1;padding:13px 20px;border:none;background:transparent;
  color:var(--ts);font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:600;
  cursor:pointer;transition:all .25s;position:relative;border-bottom:2px solid transparent;
  margin-bottom:-1px;
}
.stats-tab-btn.active{color:var(--amber);border-bottom-color:var(--amber);}
.stats-tab-btn:hover:not(.active){color:var(--tp);}
.stats-tab-divider{width:1px;background:var(--bsoft);margin:8px 0;}
.stats-tab-panel{display:none;padding-top:20px;}
.stats-tab-panel.active{display:block;}

/* Sub-table */
.sub-table{width:100%;border-collapse:collapse;font-size:.84rem;}
.sub-table th{text-align:left;padding:8px 0;color:var(--tm);font-weight:500;font-size:.76rem;text-transform:uppercase;font-family:'Space Mono',monospace;letter-spacing:.08em;}
.sub-table th:last-child,.sub-table td:last-child{text-align:right;}
.sub-table th.center,.sub-table td.center{text-align:center;}
.sub-table tr{border-bottom:1px solid var(--bsoft);transition:background .15s;}
.sub-table tbody tr:last-child{border-bottom:none;}
.sub-table tbody tr:hover{background:rgba(196,149,106,0.03);}
.sub-table td{padding:13px 0;color:var(--ts);vertical-align:middle;}
.sub-table td.camp-name{color:var(--tp);font-weight:500;}
.open-link-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:7px;
  border:1px solid var(--bsoft);background:transparent;
  color:var(--ts);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;
  cursor:pointer;transition:all .2s;
  text-decoration:none;
}
.open-link-btn:hover{border-color:var(--border);color:var(--amber);}
.reason-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:7px;
  border:1px solid rgba(248,113,113,.25);background:rgba(248,113,113,.06);
  color:var(--red);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.reason-btn:hover{border-color:var(--red);background:rgba(248,113,113,.12);}

/* ── REJECTION MODAL ── */
.reject-modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(10px);z-index:2000;
  display:flex;align-items:center;justify-content:center;padding:16px;
  animation:fadeIn .2s;
}
.reject-modal-box{
  background:var(--s2);border:1px solid var(--border);
  border-radius:20px;padding:28px;width:100%;max-width:420px;
  position:relative;animation:modalIn .35s var(--ease-spring);
  overflow:hidden;
}
.reject-modal-box::before{
  content:'';display:block;height:1px;
  background:linear-gradient(90deg,transparent,var(--red),transparent);
  position:absolute;top:0;left:0;right:0;
}
.reject-label{font-family:'Space Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.18em;color:var(--red);margin-bottom:6px;}
.reject-camp-title{font-family:'Instrument Serif',serif;font-size:1.2rem;color:var(--tp);margin-bottom:18px;line-height:1.2;}
.reject-reason-box{
  background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);
  border-radius:12px;padding:16px 18px;
  font-size:.855rem;color:var(--ts);line-height:1.65;
  margin-bottom:20px;
}
.appeal-section{border-top:1px solid var(--bsoft);padding-top:18px;}
.appeal-label{font-size:.78rem;color:var(--tm);margin-bottom:8px;font-family:'DM Sans',sans-serif;}
.appeal-textarea{
  width:100%;background:var(--s3);border:1.5px solid var(--border);
  border-radius:11px;padding:12px 14px;
  color:var(--tp);font-family:'DM Sans',sans-serif;font-size:.855rem;
  outline:none;transition:border-color .2s;resize:none;min-height:90px;
  box-sizing:border-box;
}
.appeal-textarea:focus{border-color:var(--amber);}
.appeal-sent-msg{
  display:none;text-align:center;padding:12px;
  font-size:.84rem;color:var(--green);
  animation:sectIn .3s var(--ease-out);
}
.appeal-sent-msg.show{display:block;}

/* ── CHART CONTROLS ── */
.chart-card-main{overflow:visible;}
.chart-metric-btn{
  padding:6px 14px;border-radius:8px;
  border:1px solid var(--bsoft);background:transparent;
  color:var(--ts);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.chart-metric-btn:hover{border-color:var(--border);color:var(--tp);}
.chart-metric-btn.active{background:var(--adim);border-color:var(--border);color:var(--amber);}
.chart-period-btn{
  padding:5px 11px;border-radius:7px;
  border:1px solid var(--bsoft);background:transparent;
  color:var(--ts);font-family:'Space Mono',monospace;font-size:.65rem;
  cursor:pointer;transition:all .2s;
}
.chart-period-btn:hover{border-color:var(--border);color:var(--tp);}
.chart-period-btn.active{background:var(--s3);border-color:var(--border);color:var(--amber);}
.chart-tooltip{
  position:absolute;pointer-events:none;opacity:0;
  background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:9px 14px;
  font-family:'DM Sans',sans-serif;font-size:.78rem;color:var(--tp);
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  transition:opacity .15s;white-space:nowrap;z-index:10;
  transform:translate(-50%,-110%);
}

/* KPI sparkline canvas */
.kpi-spark{display:block;border-radius:6px;}

/* Pagination */
.pagination-bar{
  display:flex;align-items:center;justify-content:center;
  gap:5px;margin-top:16px;flex-wrap:wrap;
}
.pg-btn{
  min-width:32px;height:32px;border-radius:8px;
  border:1px solid var(--bsoft);background:transparent;
  color:var(--ts);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;
  cursor:pointer;transition:all .2s;padding:0 8px;
}
.pg-btn:hover:not(:disabled){border-color:var(--border);color:var(--tp);}
.pg-btn.active{background:var(--adim);border-color:var(--border);color:var(--amber);}
.pg-btn:disabled{opacity:.3;cursor:not-allowed;}
.pg-btn.pg-nav{font-size:1rem;line-height:1;}
@media(max-width:700px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:1fr 1fr;gap:10px;}
}

/* ── PAYOUTS ── */
.payout-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.payout-kpi{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(34,29,24,0.9),rgba(24,20,16,0.6));
  border:1px solid rgba(196,149,106,0.12);
  border-radius:16px;padding:24px 22px 22px;
  backdrop-filter:blur(12px);
  transition:all .35s var(--ease-out);
  cursor:default;
  animation:kpiIn .4s var(--ease-out) both;
}
.payout-kpi:nth-child(1){animation-delay:.05s;}
.payout-kpi:nth-child(2){animation-delay:.12s;}
.payout-kpi:nth-child(3){animation-delay:.19s;}
.payout-kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,149,106,0.5),transparent);
  opacity:0;transition:opacity .3s;
}
.payout-kpi:hover::before{opacity:1;}
.payout-kpi:hover{
  background:linear-gradient(135deg,rgba(44,38,30,0.95),rgba(30,25,19,0.8));
  border-color:rgba(196,149,106,0.25);
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(0,0,0,.35);
}
.payout-kpi.kpi-highlight{border-color:var(--border);}
.payout-kpi.kpi-highlight::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 20%,rgba(196,149,106,0.06),transparent 70%);
  pointer-events:none;
}
.payout-kpi-icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;font-size:1.1rem;flex-shrink:0;
}
.payout-kpi-icon.amber-icon{background:rgba(196,149,106,.12);border:1px solid rgba(196,149,106,.2);color:var(--amber);}
.payout-kpi-icon.yellow-icon{background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.18);color:#FACC15;}
.payout-kpi-icon.green-icon{background:rgba(110,231,183,.1);border:1px solid rgba(110,231,183,.18);color:var(--green);}
.payout-kpi-label{
  font-family:'Space Mono',monospace;
  font-size:.56rem;text-transform:uppercase;
  letter-spacing:.16em;color:var(--tm);
  margin-bottom:8px;
}
.balance-val{font-family:'Instrument Serif',serif;font-size:2.1rem;color:var(--tp);margin:4px 0 6px;line-height:1.1;}
.balance-val.amber{color:var(--amber);}
.balance-val.yellow{color:#FACC15;}
.balance-val.green{color:var(--green);}
.payout-kpi-sub{font-size:.76rem;color:var(--tm);margin-top:4px;line-height:1.4;}
.btn-primary{background:var(--amber);color:#0A0908;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.855rem;border:none;padding:11px 24px;border-radius:9px;cursor:pointer;transition:all .25s var(--ease-out);margin-top:10px;}
.btn-primary:hover{background:var(--tp);transform:translateY(-1px);box-shadow:0 6px 20px rgba(196,149,106,.25);}
.tx-item{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--bsoft);}
.tx-item:last-child{border-bottom:none;}
.tx-icon{width:35px;height:35px;border-radius:10px;background:var(--adim);display:flex;align-items:center;justify-content:center;font-size:.88rem;flex-shrink:0;}
.tx-desc{font-size:.855rem;font-weight:500;color:var(--tp);}
.tx-date{font-size:.73rem;color:var(--tm);}
.tx-amount{font-size:.88rem;font-weight:700;color:var(--green);text-align:right;}
.tx-status{font-size:.68rem;color:var(--tm);text-align:right;}

/* ── WITHDRAW MODAL ── */
.withdraw-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.8);
  backdrop-filter:blur(14px);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:16px;
  animation:fadeIn .25s;
}
.withdraw-box{
  background:var(--s2);border:1px solid var(--border);
  border-radius:22px;padding:32px;width:100%;max-width:440px;
  position:relative;animation:modalIn .4s var(--ease-spring);
  overflow:hidden;
}
.withdraw-box::before{
  content:'';display:block;height:2px;
  background:linear-gradient(90deg,transparent,var(--amber),transparent);
  position:absolute;top:0;left:0;right:0;
}
.wd-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:8px;border:1px solid var(--bsoft);background:var(--s3);color:var(--ts);cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.wd-close:hover{border-color:var(--border);color:var(--tp);background:var(--s4);}
.wd-eyebrow{font-family:'Space Mono',monospace;font-size:.54rem;text-transform:uppercase;letter-spacing:.18em;color:var(--amber);margin-bottom:6px;}
.wd-title{font-family:'Instrument Serif',serif;font-size:1.4rem;color:var(--tp);margin-bottom:4px;font-weight:400;line-height:1.2;}
.wd-subtitle{font-size:.8rem;color:var(--tm);margin-bottom:24px;line-height:1.5;}
.wd-amount-wrap{
  display:flex;align-items:center;gap:14px;
  margin-bottom:20px;
}
.wd-amount-input{
  flex:1;background:var(--s3);border:1.5px solid var(--border);
  border-radius:12px;padding:16px 18px;
  color:var(--tp);font-family:'Instrument Serif',serif;font-size:1.8rem;
  outline:none;transition:border-color .25s;text-align:center;
  letter-spacing:-.02em;
}
.wd-amount-input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(196,149,106,.1);}
.wd-stepper{
  display:flex;flex-direction:column;gap:6px;
}
.wd-step-btn{
  width:40px;height:36px;border-radius:10px;
  border:1px solid var(--bsoft);background:var(--s3);
  color:var(--ts);cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--ease-out);
  font-weight:700;
}
.wd-step-btn:hover{border-color:var(--amber);color:var(--amber);background:var(--adim);transform:scale(1.05);}
.wd-step-btn:active{transform:scale(.95);}
.wd-balance-hint{
  text-align:center;font-size:.76rem;color:var(--tm);margin-bottom:22px;
}
.wd-balance-hint strong{color:var(--amber);}
.wd-actions{display:flex;gap:10px;}
.wd-btn-back{
  flex:1;padding:13px;border-radius:12px;
  border:1.5px solid var(--bsoft);background:transparent;
  color:var(--ts);font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.wd-btn-back:hover{border-color:var(--border);color:var(--tp);}
.wd-btn-confirm{
  flex:2;padding:13px;border-radius:12px;
  border:none;background:var(--amber);
  color:#0A0908;font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:700;
  cursor:pointer;transition:all .25s var(--ease-out);
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.wd-btn-confirm:hover{background:var(--amber2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(196,149,106,.3);}
.wd-btn-confirm:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* Withdraw success state */
.wd-success{
  text-align:center;padding:12px 0;
  animation:sectIn .4s var(--ease-out);
}
.wd-success-icon{
  width:64px;height:64px;border-radius:50%;
  background:rgba(110,231,183,.1);border:2px solid rgba(110,231,183,.25);
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:18px;font-size:1.8rem;
  animation:successPop .5s var(--ease-spring);
}
@keyframes successPop{0%{transform:scale(0) rotate(-30deg);opacity:0;}60%{transform:scale(1.15) rotate(5deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
.wd-success-title{font-family:'Instrument Serif',serif;font-size:1.3rem;color:var(--tp);margin-bottom:8px;font-weight:400;}
.wd-success-msg{font-size:.84rem;color:var(--ts);line-height:1.6;margin-bottom:24px;}
.wd-success-msg strong{color:var(--amber);}
.wd-btn-close{
  width:100%;padding:13px;border-radius:12px;
  border:1.5px solid var(--bsoft);background:transparent;
  color:var(--ts);font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.wd-btn-close:hover{border-color:var(--border);color:var(--tp);background:var(--s3);}

@media(max-width:900px){
  .payout-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:560px){
  .payout-grid{grid-template-columns:1fr;}
  .withdraw-box{padding:22px 18px;border-radius:18px;}
  .wd-amount-input{font-size:1.4rem;padding:14px;}
}

/* ── WALLET / PROFILE ── */
/* Empty state */
.wallet-empty-card{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(34,29,24,0.9),rgba(24,20,16,0.6));
  border:1px solid rgba(196,149,106,0.12);
  border-radius:16px;padding:40px 28px;
  backdrop-filter:blur(12px);margin-bottom:18px;
  text-align:center;
}
.wallet-empty-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,149,106,0.4),transparent);
}
.wallet-empty-inner{display:flex;flex-direction:column;align-items:center;}

/* Action buttons row */
.wallet-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px;margin-bottom:4px;}
.wallet-action-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 20px;border-radius:12px;
  border:1px solid var(--bsoft);background:var(--s2);

.cm-code-val{font-family:'Space Mono',monospace;font-size:2.2rem;color:var(--amber);letter-spacing:.3em;font-weight:700;}
.cm-code-expiry{font-size:.73rem;color:var(--ts);margin-top:8px;}
.cm-code-expiry strong{color:var(--red);}
.cm-instruction{
  background:rgba(196,149,106,.06);border:1px solid rgba(196,149,106,.15);
  border-radius:11px;padding:13px 15px;font-size:.79rem;color:var(--ts);
  line-height:1.6;margin-bottom:20px;
}
.cm-instruction strong{color:var(--amber);}
.cm-actions{display:flex;gap:10px;}
.cm-btn-cancel{
  flex:1;padding:12px;border-radius:11px;
  border:1.5px solid var(--bsoft);background:transparent;
  color:var(--ts);font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.cm-btn-cancel:hover{border-color:var(--border);color:var(--tp);}
.cm-btn-verify{
  flex:2;padding:12px;border-radius:11px;border:none;background:var(--amber);
  color:#0A0908;font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:700;
  cursor:pointer;transition:all .25s var(--ease-out);
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.cm-btn-verify:hover{background:var(--amber2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(196,149,106,.3);}
.cm-btn-verify:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
/* Scanning animation */
.cm-scan-bar{height:3px;background:var(--s4);border-radius:2px;overflow:hidden;margin:14px 0;}
@keyframes scanFill{from{width:0;}to{width:100%;}}
.cm-scan-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--amber2));border-radius:2px;animation:scanFill 2s var(--ease-out) forwards;}
@keyframes cm-pulse{0%,100%{opacity:.4;}50%{opacity:1;}}
.cm-scan-text{font-size:.82rem;color:var(--ts);text-align:center;animation:cm-pulse 1.3s ease-in-out infinite;}
@keyframes successPop2{0%{transform:scale(0) rotate(-20deg);opacity:0;}60%{transform:scale(1.15) rotate(4deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.cm-success-icon{
  width:62px;height:62px;border-radius:50%;
  background:rgba(110,231,183,.1);border:2px solid rgba(110,231,183,.25);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:1.6rem;margin-bottom:14px;
  animation:successPop2 .5s var(--ease-spring);
}
.cm-success-title{font-family:'Instrument Serif',serif;font-size:1.2rem;color:var(--tp);margin-bottom:8px;}
.cm-success-msg{font-size:.82rem;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.cm-success-msg strong{color:var(--amber);}

/* ── MODAL (3-step) ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-box{
  background:var(--s2);border:1px solid var(--border);
  border-radius:22px;padding:30px;width:100%;max-width:440px;
  position:relative;animation:modalIn .35s var(--ease-spring);
  overflow:hidden;
}
@keyframes modalIn{from{opacity:0;transform:scale(.93) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-box::before{
  content:'';display:block;height:1px;
  background:linear-gradient(90deg,transparent,var(--amber),transparent);
  position:absolute;top:0;left:0;right:0;
}
.modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:8px;border:1px solid var(--bsoft);background:var(--s3);color:var(--ts);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{border-color:var(--border);color:var(--tp);}

/* Step indicator */
.modal-steps{display:flex;gap:6px;margin-bottom:24px;}
.modal-step-bar{height:3px;flex:1;border-radius:2px;background:var(--s4);transition:background .4s;}
.modal-step-bar.active{background:var(--amber);}
.modal-step-bar.done{background:rgba(196,149,106,.4);}

.modal-eyebrow{font-family:'Space Mono',monospace;font-size:.54rem;text-transform:uppercase;letter-spacing:.16em;color:var(--amber);margin-bottom:6px;}
.modal-title{font-family:'Instrument Serif',serif;font-size:1.35rem;color:var(--tp);margin-bottom:4px;font-weight:400;line-height:1.2;}
.modal-subtitle{font-size:.8rem;color:var(--tm);margin-bottom:22px;}

/* Platform cards */
.platform-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.platform-card{
  border:1.5px solid var(--bsoft);
  border-radius:14px;padding:16px 10px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;transition:all .25s var(--ease-out);
  background:var(--s3);
}
.platform-card:hover{border-color:var(--amber);background:var(--adim);transform:translateY(-2px);}
.platform-card.selected{border-color:var(--amber);background:var(--adim);box-shadow:0 0 0 1px var(--amber);}
.platform-card svg,.platform-card .p-icon{font-size:1.4rem;color:var(--ts);transition:color .2s;}
.platform-card:hover svg,.platform-card.selected svg{color:var(--amber);}
.platform-card .p-name{font-size:.75rem;font-weight:600;color:var(--ts);font-family:'DM Sans',sans-serif;text-align:center;}
.platform-card.selected .p-name{color:var(--amber);}

/* Account cards */
.account-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.account-card{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;border-radius:12px;
  border:1.5px solid var(--bsoft);background:var(--s3);
  cursor:pointer;transition:all .25s;
}
.account-card:hover{border-color:var(--amber);background:var(--adim);}
.account-card.selected{border-color:var(--amber);background:var(--adim);}
.account-av{
  width:36px;height:36px;border-radius:50%;
  background:var(--adim);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Instrument Serif',serif;font-size:1rem;color:var(--amber);
  flex-shrink:0;
}
.account-handle{font-size:.87rem;font-weight:600;color:var(--tp);font-family:'DM Sans',sans-serif;}
.account-sub{font-size:.73rem;color:var(--tm);}
.account-sel-dot{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--bsoft);margin-left:auto;flex-shrink:0;transition:all .2s;}
.account-card.selected .account-sel-dot{background:var(--amber);border-color:var(--amber);}

/* URL input step */
.modal-url-hint{font-size:.76rem;color:var(--tm);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.modal-input{
  width:100%;background:var(--s3);border:1.5px solid var(--border);
  border-radius:11px;padding:12px 14px;
  color:var(--tp);font-family:'DM Sans',sans-serif;font-size:.9rem;
  outline:none;transition:border-color .2s;
  box-sizing:border-box;
}
.modal-input:focus{border-color:var(--amber);}

/* Modal nav buttons */
.modal-nav{display:flex;gap:10px;margin-top:6px;}
.modal-btn-back{
  flex:1;padding:12px;border-radius:11px;
  border:1.5px solid var(--bsoft);background:transparent;
  color:var(--ts);font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.modal-btn-back:hover{border-color:var(--border);color:var(--tp);}
.modal-btn-next{
  flex:2;padding:12px;border-radius:11px;
  border:none;background:var(--amber);
  color:#0A0908;font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:700;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.modal-btn-next:hover{background:var(--amber2);}
.modal-btn-next:disabled{opacity:.4;cursor:not-allowed;}
.modal-label{font-size:.78rem;color:var(--tm);margin-bottom:6px;display:block;font-family:'DM Sans',sans-serif;}

/* ── UTILITY ── */
/* Ambient background — subtle dot grid + soft glow orbs */
.grid-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(196,149,106,0.04) 1px,transparent 1px);
  background-size:32px 32px;
  mask-image:radial-gradient(ellipse 70% 55% at 50% 40%,black 5%,transparent 70%);
}
.grid-bg::before{
  content:'';position:absolute;
  width:600px;height:600px;
  top:-200px;right:-100px;
  background:radial-gradient(circle,rgba(196,149,106,0.04) 0%,transparent 70%);
  border-radius:50%;
  pointer-events:none;
}
.grid-bg::after{
  content:'';position:absolute;
  width:500px;height:500px;
  bottom:-150px;left:-80px;
  background:radial-gradient(circle,rgba(196,149,106,0.03) 0%,transparent 70%);
  border-radius:50%;
  pointer-events:none;
}
#loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.spin{width:34px;height:34px;border-radius:50%;border:2px solid var(--s3);border-top-color:var(--amber);animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.fade-out{opacity:0;transition:opacity .4s;}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:11px;background:var(--s2);border:1px solid var(--border);color:var(--tp);font-size:.855rem;z-index:9000;animation:toastIn .3s var(--ease-out);pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.4);}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.kpi-label{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--tm);margin-bottom:8px;}
.prog-wrap{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin:7px 0;}
.prog-fill-static{height:100%;background:var(--amber);border-radius:3px;transition:width .6s ease;}

/* HOME grid */
.home-grid{display:grid;grid-template-columns:2fr 1fr;gap:18px;}
.quick-actions{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
.qa-btn{display:flex;align-items:center;gap:7px;padding:11px 18px;border-radius:10px;border:1px solid var(--bsoft);background:var(--s2);color:var(--ts);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:500;transition:all .2s;}
.qa-btn:hover{border-color:var(--border);color:var(--amber);background:var(--adim);}

/* KPI GRID on home — removed */

.submit-btn-mobile{display:none;width:100%;margin-top:12px;margin-bottom:2px;}

@media(max-width:1100px){.camp-grid{grid-template-columns:repeat(2,1fr);}}

@media(max-width:900px){
  /* Sidebar becomes collapsible */
  .sb-toggle{display:flex;}
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;
    transform:translateX(-100%);
    box-shadow:8px 0 40px rgba(0,0,0,.5);
  }
  .sidebar.open{transform:translateX(0);}
  .camp-detail-top{grid-template-columns:1fr!important;}
  .detail-layout{grid-template-columns:1fr;}
  .detail-kpi-row{grid-template-columns:repeat(2,1fr);}
  .budget-card{padding:16px 18px;}
  .detail-title{font-size:1.2rem;}
  .submit-btn-header{display:none;}
  .submit-btn-mobile{display:flex;align-items:center;justify-content:center;}
  .section{padding:24px 20px;padding-top:68px;}/* space for hamburger */
  .pg-head{padding-top:0;}
}

@media(max-width:700px){
  .camp-grid{grid-template-columns:1fr;}
  .section{padding:20px 14px;padding-top:64px;}
  .detail-kpi-row{grid-template-columns:repeat(2,1fr);gap:10px;}
  .pg-title{font-size:1.5rem;}
  .cc-banner{height:90px;}
  .detail-header{gap:8px;}
  .back-btn{padding:7px 12px;font-size:.78rem;}
  .budget-footnote{flex-wrap:wrap;gap:4px;}
  .stats-row{grid-template-columns:1fr;}
}

@media(max-width:560px){
  .sb-toggle{top:12px;left:12px;width:36px;height:36px;border-radius:8px;}
  .detail-kpi-row{gap:8px;}
  .d-kpi{padding:14px 12px 12px;}
  .d-kpi-val{font-size:1.2rem;}
  .d-kpi-label{font-size:.5rem;}
  .detail-icon{width:40px;height:40px;font-size:1.1rem;border-radius:10px;}
  .submit-btn{padding:9px 14px;font-size:.78rem;}
  .budget-card{padding:14px;}
  .budget-card-meta{font-size:.62rem;}
  .platform-grid{gap:7px;}
  .platform-card{padding:12px 6px;border-radius:10px;}
  .platform-card .p-name{font-size:.68rem;}
  .modal-box{padding:20px 16px;}
  .modal-title{font-size:1.15rem;}
}

@media(max-width:1100px){
  .camp-grid{grid-template-columns:repeat(2,1fr);}
  .stats-row{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:900px){
  .sb-toggle{display:flex;}
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;
    transform:translateX(-100%);
    box-shadow:8px 0 40px rgba(0,0,0,.5);
  }
  .sidebar.open{transform:translateX(0);}
  .camp-detail-top{grid-template-columns:1fr!important;}
  .detail-layout{grid-template-columns:1fr;}
  .detail-kpi-row{grid-template-columns:repeat(2,1fr);}
  .budget-card{padding:16px 18px;}
  .detail-title{font-size:1.2rem;}
  .submit-btn-header{display:none;}
  .submit-btn-mobile{display:flex;align-items:center;justify-content:center;}
  .section{padding:24px 20px;padding-top:68px;}
  .pg-head{padding-top:0;}
  /* chart controls wrap on mobile */
  .chart-card-main > div:first-child{flex-direction:column;align-items:flex-start;gap:8px;}
  /* submission table scroll */
  .sub-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .sub-table{min-width:520px;}
}

@media(max-width:700px){
  .camp-grid{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:10px;}
  .section{padding:20px 14px;padding-top:64px;}
  .detail-kpi-row{grid-template-columns:repeat(2,1fr);gap:10px;}
  .pg-title{font-size:1.5rem;}
  .cc-banner{height:90px;}
  .detail-header{gap:8px;flex-wrap:wrap;}
  .back-btn{padding:7px 12px;font-size:.78rem;}
  .budget-footnote{flex-wrap:wrap;gap:4px;}
  /* hide less critical table cols on small */
  .sub-table .hide-mobile{display:none;}
  /* chart controls: stack metric + period vertically */
  .chart-metric-btn{font-size:.72rem;padding:5px 10px;}
  .chart-period-btn{font-size:.6rem;padding:4px 8px;}
  /* stat card font smaller */
  .stat-value{font-size:1.55rem;}
  /* pagination smaller */
  .pg-btn{min-width:28px;height:28px;font-size:.72rem;}
}

@media(max-width:560px){
  .sb-toggle{top:12px;left:12px;width:36px;height:36px;border-radius:8px;}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:8px;}
  .stat-card{padding:16px 14px 14px;}
  .stat-value{font-size:1.35rem;}
  .stat-label{font-size:.5rem;}
  .stat-delta{font-size:.67rem;}
  .detail-kpi-row{gap:8px;}
  .d-kpi{padding:14px 12px 12px;}
  .d-kpi-val{font-size:1.2rem;}
  .d-kpi-label{font-size:.5rem;}
  .detail-icon{width:40px;height:40px;font-size:1.1rem;border-radius:10px;}
  .submit-btn{padding:9px 14px;font-size:.78rem;}
  .budget-card{padding:14px;}
  .budget-card-meta{font-size:.62rem;}
  .platform-grid{gap:7px;}
  .platform-card{padding:12px 6px;border-radius:10px;}
  .platform-card .p-name{font-size:.68rem;}
  .modal-box{padding:20px 16px;}
  .modal-title{font-size:1.15rem;}
  /* stats tabs */
  .stats-tab-btn{font-size:.76rem;padding:11px 12px;}
  /* reject modal */
  .reject-modal-box{padding:20px 16px;border-radius:16px;}
  /* chart height reduce */
  #stats-line-chart{height:160px;}
}

@media(max-width:480px){
  .section{padding:14px 10px;padding-top:60px;}
  .camp-grid{gap:10px;}
  .modal-box{border-radius:16px;padding:18px 14px;}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:8px;}
  .stat-card{border-radius:12px;}
  /* hide earned col on very small */
  .sub-table .hide-xs{display:none;}
  .pg-title{font-size:1.3rem;}
  .pg-eyebrow{font-size:.52rem;}
}
</style>
</head>
<body>
<div id="app">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <img src="clipencylogo2.png" alt="Clipency" class="sb-logo-img" onerror="this.src='Clipencylogo.png'"/>
  </div>
  <div class="sb-nav">
    <p class="nav-label">Clipper</p>
    <nav>
      <button class="nav-item active" id="nav-campaigns">
        <span class="nav-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="m10 9 5 3-5 3z"/></svg></span>
        <span>Campaigns</span><span class="nav-dot"></span>
      </button>
      <button class="nav-item" onclick="location.href='/stats'">
        <span class="nav-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg></span>
        <span>Stats</span><span class="nav-dot"></span>
      </button>
      <button class="nav-item" onclick="location.href='/payouts'">
        <span class="nav-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg></span>
        <span>Payouts</span><span class="nav-dot"></span>
      </button>
      <button class="nav-item" onclick="location.href='/wallet'">
        <span class="nav-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg></span>
        <span>Wallet</span><span class="nav-dot"></span>
      </button>
    </nav>
    <p class="nav-label" style="margin-top:6px;">Account</p>
    <nav>
      <button class="nav-item" onclick="location.href='/profile'">
        <span class="nav-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg></span>
        <span>Profile</span><span class="nav-dot"></span>
      </button>
    </nav>
  </div>
  <div class="sb-profile">
    <div class="sb-av" id="sb-avatar">A</div>
    <div class="sb-info">
      <div class="sb-name" id="sb-name">Loading…</div>
      <div class="sb-role">Clipper</div>
    </div>
    <button class="sb-signout" id="btn-signout" title="Sign out">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>

<!-- MAIN -->
<div class="main-content" id="main-content">
  <!-- HEADER -->
  <div class="pg-top">
    <div>
      <p class="pg-eyebrow">Clipency</p>
      <h1 class="pg-title">Campaigns</h1>
      <p class="pg-sub">Pick a campaign, submit your clip, and earn.</p>
    </div>
    <div class="user-chip" id="user-chip">
      <div class="uc-av" id="uc-avatar">A</div>
      <div class="uc-name" id="uc-name">Loading</div>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="genre-bar" id="genre-bar">
    <button class="genre-btn active" data-genre="All" onclick="filterCampaigns('All',this)">All</button>
    <span class="camp-count" id="camp-count">Loading…</span>
  </div>

  <!-- CAMPAIGNS GRID -->
  <div class="camp-grid" id="camp-grid">
    <div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--tm);font-size:.88rem;">
      <div class="spin" style="display:inline-block;margin-right:8px;"></div>Loading campaigns…
    </div>
  </div>

  <!-- CAMPAIGN DETAIL (hidden by default) -->
  <div id="camp-detail" class="hidden"></div>
</div>

</div><!-- #app -->

<!-- SUBMIT MODAL -->
<div class="modal-overlay hidden" id="submit-modal">
  <div class="modal-box" id="submit-box">
    <button class="modal-close" onclick="closeSubmitModal()">✕</button>
    <div class="modal-eyebrow">Submit Clip</div>
    <div class="modal-title" id="sm-camp-title">Campaign</div>
    <p class="modal-subtitle" id="sm-camp-sub">Fill in your clip details below.</p>
    <div id="sm-steps">
      <div style="margin-bottom:14px;">
        <label class="modal-label">Platform</label>
        <div class="platform-grid" id="sm-platforms"></div>
      </div>
      <div style="margin-bottom:14px;">
        <label class="modal-label">Your Handle</label>
        <input class="modal-input" id="sm-handle" type="text" placeholder="@yourhandle"/>
      </div>
      <div style="margin-bottom:20px;">
        <label class="modal-label">Clip URL</label>
        <input class="modal-input" id="sm-url" type="url" placeholder="https://..."/>
      </div>

      <div style="font-size:2rem;margin-bottom:12px;">✅</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin></script>
<script src="/supabaseClient.js"></script>
<script>
/* ══ AUTH GUARD ══ */
(function(){
  function reveal(){ document.getElementById('auth-hide')?.remove(); document.body.style.visibility=''; }
  function bail()  { document.body.innerHTML=''; location.replace('/login'); }
  async function check(){
    let t=0;
    while(!window.clipencySupabase&&!window.supabaseClient&&t++<30) await new Promise(r=>setTimeout(r,100));
    const sb=window.clipencySupabase||window.supabaseClient;
    if(!sb){bail();return;}
    try{ const{data:{user}}=await sb.auth.getUser(); if(!user)bail(); else reveal(); }catch{bail();}
  }
  check();
})();
</script>
<script>
'use strict';
const getSb=()=>window.clipencySupabase||window.supabaseClient||window.sbClient;

/* ── CONSTANTS ── */
const SPARK_COLORS={Music:'#a78bfa',Gaming:'#34d399',Sports:'#f97316',Dance:'#f472b6',UGC:'#60a5fa',General:'#C4956A'};
let CAMPAIGNS=[], currentUser=null, _lastGenre='All', _submitCampId=null;

/* ── FMT ── */
function fmt(n){
  const v=Number(n)||0;
  if(v===0) return '$0';
  if(v>=1000000) return '$'+(v/1000000).toFixed(1).replace(/\.0$/,'')+'M';
  if(v>=1000) return '$'+Math.round(v/1000)+'K';
  return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtV(n){ const v=Number(n)||0; if(v>=1e6)return (v/1e6).toFixed(1)+'M'; if(v>=1e3)return Math.round(v/1e3)+'K'; return String(v); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function parseReqs(raw){
  if(!raw) return [];
  try{ const p=JSON.parse(raw); if(Array.isArray(p)) return p.map(x=>String(x).replace(/^["\']+|["\']+$/g,'')); }catch{}
  return raw.split(/\n|\|,/).map(x=>x.trim()).filter(x=>x.length>2);
}
function daysLeft(end){ if(!end) return null; const d=Math.ceil((new Date(end)-Date.now())/86400000); return d>0?d:0; }
function iconFor(cat){ const c=(cat||'').toLowerCase(); return c.includes('music')?'🎵':c.includes('gaming')?'🎮':c.includes('sport')?'🏆':c.includes('dance')?'💃':c.includes('ugc')?'📱':'📎'; }

/* ── INIT ── */
(async()=>{
  const sb=getSb(); if(!sb) return;
  const{data:{user:u}}=await sb.auth.getUser(); if(!u) return;
  currentUser=u;
  const{data:p}=await sb.from('profiles').select('full_name,avatar_url').eq('id',u.id).single();
  const name=p?.full_name||u.email?.split('@')[0]||'Clipper';
  document.getElementById('sb-name').textContent=name;
  document.getElementById('uc-name').textContent=name;
  ['sb-avatar','uc-avatar'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    if(p?.avatar_url) el.innerHTML=`<img src="${p.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"/>`;
    else el.textContent=name[0]?.toUpperCase()||'A';
  });
  document.getElementById('btn-signout').onclick=async()=>{ await sb.auth.signOut(); location.replace('/login'); };
  await loadCampaigns();
  // Realtime
  sb.channel('camps-rt').on('postgres_changes',{event:'*',schema:'public',table:'campaigns'},loadCampaigns).subscribe();
})();

/* ── LOAD CAMPAIGNS ── */
async function loadCampaigns(){
  const sb=getSb(); if(!sb) return;
  const{data:camps,error}=await sb.from('campaigns')
    .select('*').eq('status','active').order('created_at',{ascending:false});
  if(error||!camps) return;

  CAMPAIGNS=camps.map(c=>{
    const budgetUsd = Number(c.budget_usd||c.budget||0);
    const spentUsd  = Number(c.spent_usd||c.budget_used||0);
    const pct       = budgetUsd>0 ? Math.min(100,Math.round((spentUsd/budgetUsd)*100)) : 0;
    const platforms = c.platform ? c.platform.split(',').map(x=>x.trim()).filter(Boolean) : ['Instagram','TikTok','YouTube'];
    return {
      id:         c.id,
      title:      c.title||'Campaign',
      brandName:  c.brand_name||'',
      icon:       iconFor(c.category||c.genre),
      genre:      c.genre||c.category||'General',
      category:   c.category||c.genre||'General',
      rpmUsd:     Number(c.rpm||c.rate_per_million_usd)||0,
      budgetUsd,spentUsd,pct,
      platforms,
      reqs:       parseReqs(c.requirements),
      description:c.description||'',
      clippers:   Number(c.creators_count)||0,
      banner:     c.asset_url||null,
      isNew:      c.is_new===true,
      startDate:  c.start_date,
      endDate:    c.end_date,
      sparkData:  [30,50,40,70,60,80,90],
    };
  });

  // Build genre tabs from real data
  const genres=['All',...new Set(CAMPAIGNS.map(c=>c.genre).filter(Boolean))];
  const bar=document.getElementById('genre-bar');
  bar.innerHTML=genres.map(g=>`<button class="genre-btn${g===_lastGenre?' active':''}" data-genre="${g}" onclick="filterCampaigns('${esc(g)}',this)">${esc(g)}</button>`).join('')
    +`<span class="camp-count" id="camp-count"></span>`;

  renderCampaigns(_lastGenre);
}

/* ── RENDER GRID ── */
function filterCampaigns(genre,btn){
  _lastGenre=genre;
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderCampaigns(genre);
}

function renderCampaigns(genre='All'){
  const filtered=genre==='All'?CAMPAIGNS:CAMPAIGNS.filter(c=>c.genre===genre||c.category===genre);
  const el=document.getElementById('camp-count'); if(el) el.textContent=filtered.length+' campaigns';
  const grid=document.getElementById('camp-grid');
  if(!filtered.length){
    grid.innerHTML='<div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--tm);font-size:.88rem;">No campaigns in this category.</div>';
    return;
  }
  grid.innerHTML=filtered.map(c=>{
    const avColors=['#C4956A','#6EE7B7','#a78bfa','#f97316','#60a5fa','#f472b6'];
    const initials=['Z','M','A','P','L','J','S','R'];
    const avCount=Math.min(4,c.clippers);
    const avHtml=initials.slice(0,avCount).map((l,i)=>`<div class="cc-creator-av" style="background:${avColors[i%avColors.length]}22;border-color:${avColors[i%avColors.length]}44;color:${avColors[i%avColors.length]}">${l}</div>`).join('');
    const extraCount=c.clippers-avCount;
    const days=daysLeft(c.endDate);
    const daysHtml=days!==null?`<span class="tag" style="background:rgba(250,204,21,.08);border-color:rgba(250,204,21,.18);color:#FACC15;">${days}d left</span>`:'';
    const newHtml=c.isNew?`<span class="tag-new tag">New</span>`:'';
    const bannerHtml=c.banner
      ?`<img src="${c.banner}" alt="Campaign Banner" style="width:100%;height:100%;object-fit:cover;"/>`
      :`<div class="cc-banner-placeholder"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="14" rx="2"/><path d="m3 15 4-4 4 4 4-6 4 6"/></svg><span>Campaign Banner</span></div>`;
    return `
    <div class="camp-card" onclick="showCampDetail('${c.id}')" style="--prog-w:${c.pct}%">
      <div class="cc-header">
        <div class="cc-icon">${c.icon}</div>
        <div class="cc-title-wrap">
          <div class="cc-title">${esc(c.title)}</div>
          <div class="cc-tags">
            <span class="tag">${esc(c.genre)}</span>
            ${newHtml}${daysHtml}
          </div>
        </div>
      </div>
      <div class="cc-banner">${bannerHtml}</div>
      <div class="cc-kpi">
        <div class="cc-kpi-item">
          <div class="cc-kpi-label">Rate / 1M</div>
          <div class="cc-kpi-val amber">${fmt(c.rpmUsd)}</div>
        </div>
        <div class="cc-kpi-item">
          <div class="cc-kpi-label">Clippers</div>
          <div class="cc-kpi-val">${c.clippers}</div>
        </div>
      </div>
      <div class="cc-progress">
        <div class="prog-label-row">
          <span class="prog-label">Budget Used</span>
          <span class="prog-pct">${c.pct}%</span>
        </div>
        <div class="prog-track"><div class="prog-fill"></div></div>
      </div>
      <div class="cc-footer">
        <div class="cc-creators">
          <div class="cc-creator-avatars">${avHtml}</div>
          ${extraCount>0?`<span class="cc-creators-label" style="margin-left:8px;">+${extraCount} clippers</span>`:''}
        </div>
        <div class="cc-cta">View Campaign <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg></div>
      </div>
    </div>`;
  }).join('');
}

/* ── CAMPAIGN DETAIL ── */
async function showCampDetail(id){
  const c=CAMPAIGNS.find(x=>String(x.id)===String(id));
  if(!c) return;
  document.getElementById('camp-grid').classList.add('hidden');
  const detail=document.getElementById('camp-detail');
  detail.classList.remove('hidden');

  const color=SPARK_COLORS[c.genre]||'#C4956A';

  // Show skeleton first
  detail.innerHTML=`<div style="padding:40px;text-align:center;color:var(--tm);"><div class="spin" style="display:inline-block;"></div> Loading campaign…</div>`;

  // Load live data: submissions + top clippers
  const sb=getSb();
  const campIdStr=String(c.id);

  // Submissions for this campaign
  const{data:subs}=await sb.from('clip_submissions')
    .select('user_id,views_count,approved_amount,earning_amount,status,handle,created_at,likes,comments,engagement_rate')
    .eq('campaign_id',campIdStr);

  const approvedSubs=(subs||[]).filter(s=>s.status==='approved'||s.status==='paid');
  const pendingSubs=(subs||[]).filter(s=>s.status==='pending');
  const totalViewsReal=approvedSubs.reduce((a,s)=>a+Number(s.views_count||0),0);
  const totalEarnReal=approvedSubs.reduce((a,s)=>a+Number(s.approved_amount||s.earning_amount||0),0);
  const uniqueClippers=new Set(approvedSubs.map(s=>s.user_id)).size;

  // User's own submission for this campaign
  const mySubmission=(subs||[]).find(s=>s.user_id===currentUser?.id);

  // Top 5 clippers: group by user_id
  const clipperMap={};
  approvedSubs.forEach(s=>{
    if(!clipperMap[s.user_id]) clipperMap[s.user_id]={uid:s.user_id,views:0,earned:0,handle:s.handle||''};
    clipperMap[s.user_id].views+=Number(s.views_count||0);
    clipperMap[s.user_id].earned+=Number(s.approved_amount||s.earning_amount||0);
  });
  const topIds=Object.values(clipperMap).sort((a,b)=>b.earned-a.earned||b.views-a.views).slice(0,5);

  // Fetch profiles for top clippers
  let topClippers=[];
  if(topIds.length){
    const{data:profs}=await sb.from('profiles').select('id,full_name,username,avatar_url').in('id',topIds.map(t=>t.uid));
    topClippers=topIds.map(t=>{
      const p=(profs||[]).find(x=>x.id===t.uid)||{};
      return{...t, name:p.full_name||p.username||'Clipper', username:p.username||'', avatar:p.avatar_url||null};
    });
  }

  // Spark data from approved submissions (7 days)
  const now=Date.now();
  const sparkData=Array.from({length:7},(_,i)=>{
    const s=now-(6-i)*86400000, e=s+86400000;
    return approvedSubs.filter(x=>{const t=new Date(x.created_at).getTime();return t>=s&&t<e;}).reduce((a,x)=>a+Number(x.views_count||0),0)/1000;
  });
  // fallback if all zeros
  const finalSpark=sparkData.some(v=>v>0)?sparkData:[30,50,40,70,60,80,90];

  const days=daysLeft(c.endDate);
  const reqs=c.reqs.length?c.reqs:['Submit your clip URL and platform handle.'];

  const submitBtnHtml=mySubmission
    ?`<button class="submit-btn" style="opacity:.6;cursor:default;">
        ${mySubmission.status==='approved'?'✓ Approved':mySubmission.status==='rejected'?'✗ Rejected':'⏳ Under Review'}
      </button>`
    :`<button class="submit-btn" onclick="openSubmitModal('${c.id}')">Submit Your Clip →</button>`;

  // Rank medal helper
  const medal=i=>i===0?'gold':i===1?'silver':i===2?'bronze':'';

  // Avatar initials helper
  const initials=name=>{ const p=name.trim().split(' '); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():name.slice(0,2).toUpperCase(); };

  detail.innerHTML=`
    <div class="detail-header">
      <button class="back-btn" onclick="hideCampDetail()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Campaigns
      </button>
      <div class="detail-icon">${c.icon}</div>
      <div class="detail-title-wrap">
        <div class="detail-title">${esc(c.title)}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;">
          <span class="tag">${esc(c.genre)}</span>
          ${c.platforms.map(p=>`<span class="tag">${esc(p)}</span>`).join('')}
          ${c.isNew?'<span class="tag-new tag">New</span>':''}
          ${days!==null?`<span class="tag" style="color:#FACC15;border-color:rgba(250,204,21,.2);">${days}d left</span>`:''}
        </div>
        ${submitBtnHtml.replace('submit-btn-header','').replace('submit-btn-mobile','')}
      </div>
      ${submitBtnHtml.replace('onclick=','class="submit-btn submit-btn-header" onclick=')}
    </div>

    <div class="camp-detail-top">
      <!-- Campaign Info -->
      <div class="card" style="border-color:var(--border);">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
          ${c.banner?`<img src="${c.banner}" style="width:48px;height:48px;border-radius:12px;object-fit:cover;border:1px solid var(--border);"/>`:`<div style="width:48px;height:48px;border-radius:12px;background:var(--adim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;">${c.icon}</div>`}
          <div>
            <div style="font-family:'Instrument Serif',serif;font-size:1.2rem;color:var(--tp);line-height:1.2;">${esc(c.title)}</div>
            <div style="font-size:.74rem;color:var(--tm);margin-top:2px;">${c.brandName?esc(c.brandName)+' · ':''}${esc(c.genre)}</div>
          </div>

        <div>

        <span class="budget-rpm">RPM: ${fmt(c.rpmUsd)} / 1M</span>
      </div>
    </div>

    <!-- KPI Row -->
    <div class="detail-kpi-row">
      <div class="d-kpi">
        <span class="d-kpi-label">Views Generated</span>
        <div class="d-kpi-val green">${totalViewsReal?fmtV(totalViewsReal):'—'}</div>
        <div class="d-kpi-sub">${approvedSubs.length} approved clips</div>

      <div class="d-kpi">
        <span class="d-kpi-label">Est. Earnings</span>
        <div class="d-kpi-val amber">${fmt(totalEarnReal)}</div>
        <div class="d-kpi-sub amber-txt">RPM: ${fmt(c.rpmUsd)} / 1M</div>
      </div>
      <div class="d-kpi">
        <span class="d-kpi-label">Clips Approved</span>
        <div class="d-kpi-val purple">${approvedSubs.length}</div>
        <div class="d-kpi-sub">${pendingSubs.length} pending review</div>
      </div>
      <div class="d-kpi">
        <span class="d-kpi-label">Clippers Joined</span>
        <div class="d-kpi-val">${uniqueClippers||c.clippers}</div>
        <div class="d-kpi-sub">active creators</div>
      </div>
    </div>

    <!-- Requirements -->
    <div class="card" style="text-align:center;padding:28px 24px;">

          <div style="width:18px;height:18px;border-radius:50%;background:rgba(110,231,183,.1);border:1px solid rgba(110,231,183,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#6EE7B7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
