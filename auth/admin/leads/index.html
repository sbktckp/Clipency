<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Clipency | Admin</title>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000}</style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin></script>
  <script>
    // Inline supabase init in case supabaseClient.js has issues
    window.addEventListener('load', function() {
      if (!window.supabaseClient && window.supabase) {
        try {
          var s = document.querySelector('script[data-sb]');
          if (s) { window.supabaseClient = window.supabase.createClient(s.dataset.url, s.dataset.key); }
        } catch(e) {}
      }
    });
  </script>
  <script src="/supabaseClient.js"></script>
  <script src="/clipency-admin-os.js"></script>
</body>
</html>
