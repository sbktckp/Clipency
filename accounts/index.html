<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipency — Accounts</title>
  <script src="/supabaseClient.js"></script>
  <style>
    :root{
      --bg:#050403;
      --panel:#15100c;
      --panel2:#1d160f;
      --text:#fff8ef;
      --muted:rgba(216,199,180,.72);
      --soft:rgba(216,199,180,.48);
      --gold:#e0ac78;
      --border:rgba(224,172,120,.22);
      --green:#72f0aa;
      --red:#ff9b9b;
      --yellow:#ffd35a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(circle at 12% 12%, rgba(224,172,120,.12), transparent 30%),
        radial-gradient(circle at 88% 8%, rgba(35,95,75,.13), transparent 34%),
        #050403;
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .shell{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
    .side{
      border-right:1px solid rgba(224,172,120,.15);
      background:linear-gradient(180deg,rgba(22,18,10,.94),rgba(5,4,3,.98));
      padding:36px 24px;
      position:sticky;
      top:0;
      height:100vh;
    }
    .logo{font-size:25px;font-weight:950;letter-spacing:-.04em;margin:0 0 58px}
    .section-label{font-size:11px;letter-spacing:.28em;color:var(--soft);font-weight:950;margin:28px 0 16px;text-transform:uppercase}
    .nav{display:grid;gap:8px}
    .nav a{
      color:var(--muted);
      text-decoration:none;
      padding:15px 16px;
      border-radius:17px;
      font-weight:850;
      display:flex;
      align-items:center;
      gap:12px;
      transition:.22s ease;
    }
    .nav a:hover,.nav a.active{
      color:var(--gold);
      background:rgba(224,172,120,.11);
      box-shadow:inset 0 0 0 1px rgba(224,172,120,.2);
    }
    .main{padding:64px min(7vw,92px)}
    .eyebrow{color:var(--gold);letter-spacing:.24em;text-transform:uppercase;font-size:12px;font-weight:950}
    h1{
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(46px,6vw,86px);
      line-height:.95;
      letter-spacing:-.065em;
      margin:14px 0 16px;
    }
    .sub{
      color:var(--muted);
      font-size:21px;
      line-height:1.45;
      max-width:850px;
      margin:0 0 36px;
    }
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px}
    .account-card{
      min-height:390px;
      border:1px solid var(--border);
      border-radius:30px;
      padding:28px;
      background:linear-gradient(145deg,rgba(31,23,17,.9),rgba(9,7,5,.95));
      box-shadow:0 30px 90px rgba(0,0,0,.28);
      transition:.25s ease;
    }
    .account-card:hover{transform:translateY(-3px);border-color:rgba(224,172,120,.36)}
    .account-top{display:grid;grid-template-columns:58px 1fr auto;gap:16px;align-items:center;margin-bottom:26px}
    .platform-icon{
      height:58px;width:58px;border-radius:18px;
      display:grid;place-items:center;
      background:rgba(224,172,120,.1);
      border:1px solid rgba(224,172,120,.22);
      color:var(--gold);
      font-size:24px;
      font-weight:950;
    }
    .account-top h2{margin:0;font-size:23px;letter-spacing:-.03em}
    .account-top p{margin:5px 0 0;color:var(--muted);font-weight:750}
    .status-pill{
      border-radius:999px;
      padding:9px 12px;
      font-size:12px;
      font-weight:950;
      white-space:nowrap;
    }
    .status-pill.empty{background:rgba(255,255,255,.06);color:var(--muted)}
    .status-pill.pending{background:rgba(255,211,90,.12);color:var(--yellow)}
    .status-pill.connected{background:rgba(80,230,150,.12);color:var(--green)}
    .status-pill.rejected,.status-pill.expired{background:rgba(255,90,90,.12);color:var(--red)}
    .account-meta{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
    .account-meta div{
      border:1px solid rgba(224,172,120,.13);
      background:rgba(255,255,255,.025);
      border-radius:18px;
      padding:16px;
    }
    .account-meta span{display:block;color:var(--soft);font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:950}
    .account-meta strong{display:block;margin-top:8px;font-size:17px}
    .code{color:var(--gold);letter-spacing:.18em}
    .profile-link{
      display:block;
      color:var(--gold);
      text-decoration:none;
      font-weight:850;
      margin:10px 0 16px;
    }
    .muted-link{color:var(--soft)}
    .notice{
      min-height:82px;
      border-radius:18px;
      padding:16px;
      background:rgba(224,172,120,.08);
      border:1px solid rgba(224,172,120,.16);
      color:var(--muted);
      line-height:1.45;
      font-weight:700;
      margin-bottom:18px;
    }
    .notice.success{background:rgba(80,230,150,.08);border-color:rgba(80,230,150,.18);color:#b8ffd7}
    .notice.danger{background:rgba(255,90,90,.08);border-color:rgba(255,90,90,.18);color:#ffc1c1}
    .notice.warning{background:rgba(255,211,90,.08);border-color:rgba(255,211,90,.18);color:#ffe5a3}
    .account-action,.modal-submit{
      width:100%;
      border:0;
      border-radius:17px;
      padding:15px 18px;
      background:var(--gold);
      color:#080604;
      font-weight:950;
      cursor:pointer;
      font-size:16px;
      transition:.2s ease;
    }
    .account-action:hover,.modal-submit:hover{transform:translateY(-1px)}
    .account-action:disabled{opacity:.65;cursor:not-allowed;transform:none}
    .error{
      margin-top:22px;
      color:#ffaaaa;
      font-weight:850;
    }
    .skeleton-card{min-height:260px}
    .skeleton-line{
      height:18px;border-radius:999px;
      background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,.11),rgba(255,255,255,.04));
      margin:16px 0;
      animation:pulse 1.2s infinite ease-in-out;
    }
    .w40{width:40%}.w55{width:55%}.w70{width:70%}
    @keyframes pulse{50%{opacity:.45}}
    .modal-backdrop{
      position:fixed;inset:0;
      z-index:999999;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(12px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
    }
    .modal-card{
      width:min(560px,96vw);
      background:linear-gradient(145deg,rgba(34,25,18,.98),rgba(9,7,5,.98));
      border:1px solid rgba(224,172,120,.28);
      border-radius:28px;
      padding:30px;
      position:relative;
      box-shadow:0 35px 100px rgba(0,0,0,.58);
    }
    .modal-close{
      position:absolute;right:22px;top:20px;
      width:40px;height:40px;border-radius:13px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:white;font-size:24px;cursor:pointer;
    }
    .modal-eyebrow{color:var(--gold);letter-spacing:.2em;text-transform:uppercase;font-size:11px;font-weight:950;margin:0}
    .modal-card h2{font-family:Georgia,serif;font-size:31px;margin:12px 0 10px}
    .modal-copy{color:var(--muted);line-height:1.55;margin:0 0 20px}
    .modal-card label{display:block;color:var(--gold);font-weight:950;font-size:12px;letter-spacing:.16em;text-transform:uppercase;margin-top:16px}
    .modal-card input{
      width:100%;margin-top:9px;border-radius:16px;
      border:1px solid rgba(224,172,120,.34);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:15px 17px;
      outline:none;
      font-size:16px;
    }
    .code-box{
      margin:20px 0;
      border-radius:20px;
      padding:20px;
      border:1px solid rgba(224,172,120,.25);
      background:rgba(224,172,120,.08);
      text-align:center;
    }
    .code-box span{display:block;color:var(--gold);letter-spacing:.16em;font-size:11px;font-weight:950;text-transform:uppercase}
    .code-box strong{display:block;font-size:42px;letter-spacing:.25em;color:var(--gold);margin-top:10px}
    .code-box p{text-align:left;color:var(--muted);line-height:1.5;margin:14px 0 0}
    @media(max-width:1100px){
      .shell{grid-template-columns:1fr}
      .side{position:relative;height:auto}
      .grid{grid-template-columns:1fr}
      .main{padding:42px 22px}
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <div class="logo">✂ CLIPENCY</div>
      <div class="section-label">Clipper</div>
      <nav class="nav">
        <a href="/campaigns">▻ Campaigns</a>
        <a href="/stats">⌁ Stats</a>
        <a href="/payouts">▭ Payouts</a>
        <a href="/wallet">▣ Wallet</a>
        <a class="active" href="/accounts">🔗 Accounts</a>
      </nav>

      <div class="section-label">Account</div>
      <nav class="nav">
        <a href="/profile">♙ Profile</a>
      </nav>
    </aside>

    <main class="main">
      <div class="eyebrow">Creator verification</div>
      <h1>Accounts.</h1>
      <p class="sub">
        Connect your creator platforms with a 6-digit verification code. Verification is usually completed within 24 hours.
      </p>

      <section id="accounts-grid" class="grid"></section>
      <div id="accounts-error" class="error"></div>
    </main>
  </div>

  <script src="/clipency-accounts-page.js"></script>
  <script src="/clipency-sidebar-accounts-link.js"></script>
</body>
</html>
