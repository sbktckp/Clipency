<script>
/* ===== CLIPENCY ADMIN CAMPAIGN STRONG FORM PATCH ===== */
(function(){
  const BUCKET = "campaign-banners";

  function getClient(){
    return window.clipencySupabase || window.supabaseClient || window.sbClient || null;
  }

  function textOf(el){
    return String(el && el.textContent || "").trim().toLowerCase();
  }

  function fieldWrapper(el){
    if(!el) return null;
    return el.closest(".form-group, .field, .input-group, .campaign-field, .form-row, .grid, div") || el.parentElement;
  }

  function labels(){
    return Array.from(document.querySelectorAll("label, .form-label, .field-label, span, p, div, h4"));
  }

  function findLabelByText(matchers){
    return labels().find(el => {
      const t = textOf(el);
      return matchers.some(m => t === m || t.includes(m));
    });
  }

  function findInputNearLabel(matchers){
    const label = findLabelByText(matchers);
    const wrap = fieldWrapper(label);
    return wrap ? wrap.querySelector("input, textarea, select") : null;
  }

  function hideByLabel(matchers){
    const label = findLabelByText(matchers);
    const wrap = fieldWrapper(label);
    if(!wrap) return;

    wrap.style.display = "none";
    wrap.setAttribute("data-cx-admin-hidden", "true");

    const input = wrap.querySelector("input, textarea, select");
    if(input){
      if(matchers.some(m => m.includes("description"))) input.value = "";
      if(matchers.some(m => m.includes("creator"))) input.value = "0";
    }
  }

  function ensureHiddenAssetInput(){
    let input =
      document.querySelector('input[name="asset_url"]') ||
      document.querySelector('#campaign-asset-url') ||
      findInputNearLabel(["asset / reference url", "asset url", "reference url", "campaign banner url"]);

    if(!input){
      input = document.createElement("input");
      input.type = "hidden";
      input.name = "asset_url";
      input.id = "campaign-asset-url";
      document.body.appendChild(input);
    }

    input.name = "asset_url";
    input.id = input.id || "campaign-asset-url";
    input.setAttribute("data-cx-asset-url", "true");

    return input;
  }

  function hideOldAssetReferenceField(){
    const label = findLabelByText(["asset / reference url", "reference url", "asset url", "campaign banner url"]);
    const wrap = fieldWrapper(label);
    const input = ensureHiddenAssetInput();

    if(wrap){
      wrap.style.display = "none";
      wrap.setAttribute("data-cx-admin-hidden", "true");

      const oldInput = wrap.querySelector("input, textarea");
      if(oldInput && oldInput !== input){
        input.value = oldInput.value || input.value || "";
        oldInput.name = "asset_url";
        oldInput.id = oldInput.id || "campaign-asset-url";
      }
    }
  }

  function ensurePlatformsField(){
    if(document.getElementById("cx-campaign-platform-wrap")) return;

    const typeInput = findInputNearLabel(["type"]);
    const typeWrap = fieldWrapper(typeInput);
    const insertAfter = typeWrap || document.querySelector("form, .modal-box, .modal, body");

    const wrap = document.createElement("div");
    wrap.id = "cx-campaign-platform-wrap";
    wrap.className = typeWrap ? typeWrap.className : "form-group";
    wrap.innerHTML = `
      <label class="form-label">PLATFORMS</label>
      <input id="campaign-platform" name="platform" type="text" value="Instagram, TikTok, YouTube Shorts" placeholder="Instagram, TikTok, YouTube Shorts">
    `;

    if(insertAfter && insertAfter.parentElement){
      insertAfter.parentElement.insertBefore(wrap, insertAfter.nextSibling);
    }
  }

  function currentPlatformValue(){
    const el = document.querySelector('#campaign-platform, input[name="platform"]');
    return el && el.value.trim() ? el.value.trim() : "Instagram, TikTok, YouTube Shorts";
  }

  function currentAssetUrl(){
    const el = ensureHiddenAssetInput();
    return el.value.trim();
  }

  function saveAssetUrl(url){
    const input = ensureHiddenAssetInput();
    input.value = url;
    input.dispatchEvent(new Event("input", { bubbles:true }));
    input.dispatchEvent(new Event("change", { bubbles:true }));
  }

  async function waitClient(){
    for(let i=0; i<50; i++){
      const client = getClient();
      if(client && client.storage && client.from && client.auth) return client;
      await new Promise(r => setTimeout(r, 120));
    }
    return null;
  }

  function safeFileName(name){
    return String(name || "banner")
      .toLowerCase()
      .replace(/[^a-z0-9._-]+/g, "-")
      .replace(/-+/g, "-")
      .replace(/^-|-$/g, "");
  }

  function ensureUploader(){
    if(document.getElementById("cx-campaign-banner-upload-card")) return;

    const titleInput = findInputNearLabel(["campaign title"]) || document.querySelector("input");
    const titleWrap = fieldWrapper(titleInput);
    const after = titleWrap || document.querySelector("form, .modal-box, .modal, body");

    const card = document.createElement("div");
    card.id = "cx-campaign-banner-upload-card";
    card.innerHTML = `
      <div class="cx-banner-card">
        <div class="cx-banner-top">
          <div>
            <div class="cx-banner-kicker">CAMPAIGN BANNER</div>
            <div class="cx-banner-title">Upload banner image</div>
            <div class="cx-banner-sub">This image will appear on campaign cards and campaign details.</div>
          </div>
          <label class="cx-banner-btn">
            Choose image
            <input id="cx-campaign-banner-file" type="file" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif,image/svg+xml">
          </label>
        </div>
        <div id="cx-campaign-banner-preview" class="cx-banner-preview">
          <span>No banner uploaded</span>
        </div>
        <div id="cx-campaign-banner-status" class="cx-banner-status"></div>
      </div>
    `;

    if(after && after.parentElement){
      after.parentElement.insertBefore(card, after.nextSibling);
    }

    const input = card.querySelector("#cx-campaign-banner-file");
    const preview = card.querySelector("#cx-campaign-banner-preview");
    const status = card.querySelector("#cx-campaign-banner-status");

    const existing = currentAssetUrl();
    if(existing && /^https?:\/\//i.test(existing)){
      preview.innerHTML = `<img src="${existing}" alt="Campaign banner preview">`;
    }

    input.addEventListener("change", async function(){
      const file = input.files && input.files[0];
      if(!file) return;

      if(!file.type.startsWith("image/")){
        status.textContent = "Please select an image file.";
        status.className = "cx-banner-status error";
        return;
      }

      if(file.size > 5 * 1024 * 1024){
        status.textContent = "Image too large. Maximum size is 5MB.";
        status.className = "cx-banner-status error";
        return;
      }

      status.textContent = "Uploading banner...";
      status.className = "cx-banner-status";

      const client = await waitClient();
      if(!client){
        status.textContent = "Supabase client not available. Refresh and try again.";
        status.className = "cx-banner-status error";
        return;
      }

      try{
        const { data: sessionData, error: sessionError } = await client.auth.getSession();
        if(sessionError) throw sessionError;

        const user = sessionData && sessionData.session && sessionData.session.user;
        if(!user) throw new Error("Login session expired. Please login again.");

        const clean = safeFileName(file.name);
        const ext = clean.includes(".") ? clean.split(".").pop() : "png";
        const path = `${user.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;

        const { error: uploadError } = await client.storage
          .from(BUCKET)
          .upload(path, file, {
            upsert: true,
            cacheControl: "3600",
            contentType: file.type
          });

        if(uploadError) throw uploadError;

        const { data } = client.storage.from(BUCKET).getPublicUrl(path);
        const url = data && data.publicUrl;
        if(!url) throw new Error("Could not generate public banner URL.");

        saveAssetUrl(url);
        preview.innerHTML = `<img src="${url}" alt="Campaign banner preview">`;

        status.textContent = "Banner uploaded. Click Save campaign.";
        status.className = "cx-banner-status success";
      }catch(err){
        console.error("Campaign banner upload failed:", err);
        status.textContent = err.message || "Upload failed.";
        status.className = "cx-banner-status error";
      }
    });
  }

  function patchSupabaseCampaignWrites(){
    const client = getClient();
    if(!client || client.__cxCampaignWritePatched) return;

    const originalFrom = client.from.bind(client);

    client.from = function(table){
      const query = originalFrom(table);

      if(String(table) !== "campaigns" || query.__cxCampaignQueryPatched){
        return query;
      }

      ["insert", "update", "upsert"].forEach(method => {
        if(typeof query[method] !== "function") return;

        const original = query[method].bind(query);

        query[method] = function(payload){
          function patchOne(row){
            if(!row || typeof row !== "object") return row;

            row.platform = currentPlatformValue();
            row.asset_url = currentAssetUrl() || row.asset_url || null;

            row.description = "";
            row.creators_count = 0;

            if(row.rpm && !row.rate_per_million_usd) row.rate_per_million_usd = row.rpm;
            if(row.rate_per_million_usd && !row.rpm) row.rpm = row.rate_per_million_usd;

            if(row.budget && !row.budget_usd) row.budget_usd = row.budget;
            if(row.budget_usd && !row.budget) row.budget = row.budget_usd;

            if(row.spent_usd && !row.budget_used) row.budget_used = row.spent_usd;
            if(row.budget_used && !row.spent_usd) row.spent_usd = row.budget_used;

            return row;
          }

          if(Array.isArray(payload)){
            payload = payload.map(patchOne);
          }else{
            payload = patchOne(payload);
          }

          return original(payload);
        };
      });

      query.__cxCampaignQueryPatched = true;
      return query;
    };

    client.__cxCampaignWritePatched = true;
  }

  function cleanForm(){
    ensureHiddenAssetInput();
    hideOldAssetReferenceField();
    hideByLabel(["description"]);
    hideByLabel(["creators count", "creator count", "active creators"]);
    ensurePlatformsField();
    ensureUploader();
    patchSupabaseCampaignWrites();
  }

  function boot(){
    cleanForm();

    const observer = new MutationObserver(function(){
      cleanForm();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });

    document.addEventListener("click", function(e){
      const btn = e.target.closest("button");
      if(!btn) return;

      const t = textOf(btn);
      if(t.includes("edit") || t.includes("create") || t.includes("campaign") || t.includes("save")){
        setTimeout(cleanForm, 50);
        setTimeout(cleanForm, 250);
        setTimeout(cleanForm, 800);
      }

      if(t.includes("save campaign") || t.includes("create campaign") || t.includes("update campaign")){
        const platform = document.querySelector("#campaign-platform");
        if(platform && !platform.value.trim()){
          platform.value = "Instagram, TikTok, YouTube Shorts";
        }
      }
    }, true);

    setInterval(cleanForm, 1500);
  }

  if(!document.getElementById("cx-admin-campaign-strong-style")){
    const style = document.createElement("style");
    style.id = "cx-admin-campaign-strong-style";
    style.textContent = `
      [data-cx-admin-hidden="true"]{display:none!important;}
      #cx-campaign-platform-wrap input{
        width:100%;
      }
      .cx-banner-card{
        margin:18px 0;
        padding:18px;
        border-radius:22px;
        background:rgba(255,255,255,.035);
        border:1px solid rgba(255,255,255,.12);
      }
      .cx-banner-top{
        display:flex;
        justify-content:space-between;
        gap:16px;
        align-items:center;
        flex-wrap:wrap;
      }
      .cx-banner-kicker{
        color:#a78bfa;
        font-size:12px;
        letter-spacing:.16em;
        font-weight:900;
      }
      .cx-banner-title{
        color:#fff;
        font-size:18px;
        font-weight:900;
        margin-top:4px;
      }
      .cx-banner-sub{
        color:rgba(255,255,255,.56);
        font-size:13px;
        margin-top:4px;
      }
      .cx-banner-btn{
        cursor:pointer;
        border:1px solid rgba(255,255,255,.18);
        border-radius:999px;
        padding:12px 18px;
        color:#fff;
        font-weight:900;
        background:linear-gradient(135deg,#8b5cf6,#a78bfa);
      }
      .cx-banner-btn input{display:none;}
      .cx-banner-preview{
        margin-top:16px;
        min-height:170px;
        border-radius:18px;
        border:1px dashed rgba(255,255,255,.18);
        background:rgba(0,0,0,.24);
        display:flex;
        align-items:center;
        justify-content:center;
        color:rgba(255,255,255,.44);
        overflow:hidden;
      }
      .cx-banner-preview img{
        width:100%;
        height:240px;
        object-fit:cover;
        display:block;
      }
      .cx-banner-status{
        margin-top:10px;
        font-size:13px;
        color:rgba(255,255,255,.65);
      }
      .cx-banner-status.success{color:#22c55e;}
      .cx-banner-status.error{color:#f87171;}
    `;
    document.head.appendChild(style);
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", boot);
  }else{
    boot();
  }

  window.addEventListener("load", boot);
})();
</script>
