<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Clipency | Admin Leads</title>

  <link rel="stylesheet" href="/admin/admin-black-gold.css?v=leads-direct-1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabaseClient.js?v=leads-direct-1"></script>

  <style>
    .leads-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: clamp(280px, 24vw, 395px) minmax(0, 1fr);
      background:
        radial-gradient(circle at 18% 8%, rgba(196,149,106,.14), transparent 34%),
        radial-gradient(circle at 92% 2%, rgba(26,125,112,.08), transparent 36%),
        #050403;
      color: #fff8ef;
    }

    .leads-sidebar {
      padding: 42px 22px;
      border-right: 1px solid rgba(196,149,106,.16);
      background:
        radial-gradient(circle at 50% 0%, rgba(196,149,106,.13), transparent 34%),
        linear-gradient(180deg, rgba(14,9,6,.96), rgba(5,4,3,.98));
    }

    .leads-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 27px;
      font-weight: 900;
      letter-spacing: -.04em;
      margin-bottom: 48px;
    }

    .leads-label {
      margin: 28px 16px 12px;
      font-size: 12px;
      letter-spacing: .18em;
      color: rgba(216,199,180,.48);
      font-weight: 900;
    }

    .leads-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .leads-nav a {
      min-height: 56px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      border-radius: 18px;
      text-decoration: none;
      color: rgba(216,199,180,.78);
      font-weight: 800;
      border: 1px solid transparent;
      transition: .2s ease;
    }

    .leads-nav a:hover {
      color: #e0ac78;
      transform: translateX(3px);
    }

    .leads-nav a.active {
      color: #e0ac78;
      background: linear-gradient(90deg, rgba(196,149,106,.25), rgba(196,149,106,.06));
      border-color: rgba(224,172,120,.38);
    }

    .leads-main {
      padding: clamp(42px, 5vw, 78px);
      min-width: 0;
    }

    .kicker {
      color: #e0ac78;
      letter-spacing: .22em;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(56px, 5.7vw, 92px);
      line-height: .9;
      letter-spacing: -.06em;
      color: #fff8ef;
    }

    .sub {
      max-width: 960px;
      margin: 20px 0 34px;
      color: rgba(216,199,180,.78);
      font-size: clamp(17px, 1.25vw, 21px);
      line-height: 1.45;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }

    .kpi {
      min-height: 128px;
      padding: 24px;
      border-radius: 24px;
      border: 1px solid rgba(196,149,106,.22);
      background: linear-gradient(145deg, rgba(36,24,15,.88), rgba(10,7,5,.92));
      box-shadow: 0 24px 70px rgba(0,0,0,.24);
    }

    .kpi span {
      color: rgba(216,199,180,.72);
      font-size: 14px;
    }

    .kpi strong {
      display: block;
      margin-top: 14px;
      font-size: clamp(34px, 3.3vw, 50px);
      line-height: 1;
      color: #fff;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.4fr .8fr .8fr auto;
      gap: 14px;
      margin-bottom: 24px;
    }

    .filters input,
    .filters select,
    .filters button {
      height: 56px;
      border-radius: 18px;
      padding: 0 16px;
      border: 1px solid rgba(224,172,120,.34);
      background: rgba(255,255,255,.045);
      color: #fff8ef;
      font: inherit;
    }

    .filters button {
      min-width: 132px;
      font-weight: 900;
      color: #130d08;
      background: linear-gradient(135deg, #c4956a, #e0ac78);
      cursor: pointer;
    }

    .panel {
      border: 1px solid rgba(196,149,106,.22);
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(36,24,15,.84), rgba(10,7,5,.94));
      box-shadow: 0 24px 70px rgba(0,0,0,.24);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 24px;
      border-bottom: 1px solid rgba(196,149,106,.14);
    }

    .panel-head h2 {
      margin: 0;
      font-size: clamp(28px, 3vw, 44px);
      letter-spacing: -.04em;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: rgba(196,149,106,.15);
      color: #e0ac78;
      text-transform: capitalize;
    }

    .lead-list {
      display: flex;
      flex-direction: column;
    }

    .lead-row {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(220px, .7fr) auto;
      gap: 20px;
      padding: 22px 24px;
      border-bottom: 1px solid rgba(196,149,106,.12);
    }

    .lead-row:last-child {
      border-bottom: 0;
    }

    .lead-title {
      font-size: 19px;
      font-weight: 900;
      color: #fff8ef;
      margin-bottom: 6px;
    }

    .muted {
      color: rgba(216,199,180,.68);
      font-size: 14px;
      line-height: 1.45;
    }

    .message {
      margin-top: 12px;
      color: rgba(255,248,239,.88);
      line-height: 1.5;
    }

    .lead-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: rgba(216,199,180,.76);
      font-size: 14px;
    }

    .lead-actions {
      min-width: 170px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }

    .lead-actions select {
      width: 165px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(224,172,120,.34);
      background: rgba(255,255,255,.045);
      color: #fff8ef;
      padding: 0 10px;
    }

    details {
      margin-top: 10px;
      color: rgba(216,199,180,.72);
    }

    pre {
      max-width: 720px;
      overflow: auto;
      padding: 12px;
      border-radius: 12px;
      background: rgba(0,0,0,.28);
      color: rgba(255,248,239,.84);
      font-size: 12px;
    }

    .empty {
      padding: 34px 24px;
      color: rgba(216,199,180,.72);
    }

    .error {
      padding: 24px;
      color: #ef4444;
    }

    @media (max-width: 980px) {
      .leads-page {
        grid-template-columns: 1fr;
      }

      .leads-sidebar {
        position: relative;
      }

      .kpis {
        grid-template-columns: repeat(2, minmax(0,1fr));
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .lead-row {
        grid-template-columns: 1fr;
      }

      .lead-actions {
        align-items: flex-start;
      }
    }

    @media (max-width: 560px) {
      .leads-main {
        padding: 24px;
      }

      h1 {
        font-size: 46px;
      }

      .kpis {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="leads-page">
    <aside class="leads-sidebar">
      <div class="leads-logo">✂ CLIPENCY</div>

      <div class="leads-label">ADMIN OS</div>
      <nav class="leads-nav">
        <a href="/admin/"><span>⌘</span><span>Command Center</span></a>
        <a href="/admin/reviews/"><span>✓</span><span>Reviews</span></a>
        <a href="/admin/campaigns/"><span>▷</span><span>Campaigns</span></a>
        <a href="/admin/leads/" class="active"><span>✉</span><span>Leads</span></a>
        <a href="/admin/payouts/"><span>▭</span><span>Payouts</span></a>
        <a href="/admin/users/"><span>♙</span><span>Users</span></a>
        <a href="/admin/logs/"><span>◷</span><span>Logs</span></a>
      </nav>

      <div class="leads-label">SYSTEM</div>
      <nav class="leads-nav">
        <a href="/finance.html"><span>▥</span><span>Finance OS</span></a>
        <a href="/campaigns/"><span>↗</span><span>Clipper View</span></a>
      </nav>
    </aside>

    <main class="leads-main">
      <div class="kicker">LEAD DESK</div>
      <h1>Client leads.</h1>
      <p class="sub">Track inbound brand and client interest from the landing page.</p>

      <section class="kpis">
        <div class="kpi"><span>Total leads</span><strong id="kpi-total">—</strong></div>
        <div class="kpi"><span>New leads</span><strong id="kpi-new">—</strong></div>
        <div class="kpi"><span>Qualified</span><strong id="kpi-qualified">—</strong></div>
        <div class="kpi"><span>Converted</span><strong id="kpi-converted">—</strong></div>
      </section>

      <section class="filters">
        <input id="search" placeholder="Search name, email, phone, brand, company">
        <select id="status-filter">
          <option value="all">All statuses</option>
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="qualified">Qualified</option>
          <option value="converted">Converted</option>
          <option value="rejected">Rejected</option>
        </select>
        <select id="time-filter">
          <option value="all">All time</option>
          <option value="today">Today</option>
          <option value="7">Last 7 days</option>
          <option value="30">Last 30 days</option>
        </select>
        <button id="refresh" type="button">Refresh</button>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Landing page leads</h2>
          <span class="status" id="live-status">Loading</span>
        </div>
        <div class="lead-list" id="lead-list">
          <div class="empty">Loading leads...</div>
        </div>
      </section>
    </main>
  </div>

  <script src="/admin/admin-force-cursor.js?v=leads-direct-1"></script>
  <script src="/admin/admin-black-gold.js?v=leads-direct-1"></script>

  <script>
    const state = {
      rows: []
    };

    function getClient(){
      return window.clipencySupabase || window.supabaseClient || window.sbClient || window.supabase || null;
    }

    function esc(v){
      return String(v ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function lower(v){
      return String(v || "").toLowerCase().trim();
    }

    function fmtDate(v){
      return v ? new Date(v).toLocaleString() : "—";
    }

    async function waitClient(){
      for(let i = 0; i < 40; i++){
        const client = getClient();
        if(client && client.from) return client;
        await new Promise(r => setTimeout(r, 150));
      }
      return null;
    }

    function isInTimeRange(row){
      const filter = document.getElementById("time-filter").value;
      if(filter === "all") return true;

      const created = row.created_at ? new Date(row.created_at).getTime() : 0;
      const now = Date.now();

      if(filter === "today"){
        const d = new Date();
        d.setHours(0,0,0,0);
        return created >= d.getTime();
      }

      const days = Number(filter);
      return created >= now - days * 24 * 60 * 60 * 1000;
    }

    function filteredRows(){
      const q = lower(document.getElementById("search").value);
      const status = document.getElementById("status-filter").value;

      return state.rows.filter(r => {
        const text = lower([
          r.full_name,
          r.email,
          r.phone,
          r.company,
          r.brand_name,
          r.campaign_type,
          r.budget,
          r.message,
          r.source_page,
          JSON.stringify(r.raw_payload || {})
        ].join(" "));

        const matchesSearch = !q || text.includes(q);
        const matchesStatus = status === "all" || lower(r.status || "new") === status;
        const matchesTime = isInTimeRange(r);

        return matchesSearch && matchesStatus && matchesTime;
      });
    }

    function updateKpis(){
      const rows = state.rows;
      document.getElementById("kpi-total").textContent = rows.length;
      document.getElementById("kpi-new").textContent = rows.filter(r => lower(r.status || "new") === "new").length;
      document.getElementById("kpi-qualified").textContent = rows.filter(r => lower(r.status) === "qualified").length;
      document.getElementById("kpi-converted").textContent = rows.filter(r => lower(r.status) === "converted").length;
    }

    function render(){
      updateKpis();

      const list = document.getElementById("lead-list");
      const rows = filteredRows();

      if(!rows.length){
        list.innerHTML = '<div class="empty">No leads found for this filter.</div>';
        return;
      }

      list.innerHTML = rows.map(r => {
        const raw = r.raw_payload || {};
        const title = r.full_name || r.brand_name || r.company || "New lead";
        const subtitle = [
          r.email,
          r.phone,
          r.company || r.brand_name
        ].filter(Boolean).join(" • ");

        return `
          <article class="lead-row" data-id="${esc(r.id)}">
            <div>
              <div class="lead-title">${esc(title)}</div>
              <div class="muted">${esc(subtitle || "No contact details")}</div>
              <div class="muted">${esc(fmtDate(r.created_at))} • ${esc(r.source_page || "landing page")}</div>
              ${r.message ? `<div class="message">${esc(r.message)}</div>` : ""}
              ${
                Object.keys(raw).length
                  ? `<details><summary>Raw submitted data</summary><pre>${esc(JSON.stringify(raw, null, 2))}</pre></details>`
                  : ""
              }
            </div>

            <div class="lead-meta">
              <div><strong>Campaign:</strong> ${esc(r.campaign_type || "—")}</div>
              <div><strong>Budget:</strong> ${esc(r.budget || "—")}</div>
              <div><strong>Brand:</strong> ${esc(r.brand_name || r.company || "—")}</div>
            </div>

            <div class="lead-actions">
              <span class="status">${esc(r.status || "new")}</span>
              <select data-status>
                ${["new","contacted","qualified","converted","rejected"].map(s =>
                  `<option value="${s}" ${lower(r.status || "new") === s ? "selected" : ""}>${s}</option>`
                ).join("")}
              </select>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadLeads(){
      const list = document.getElementById("lead-list");
      const live = document.getElementById("live-status");

      live.textContent = "Loading";

      const client = await waitClient();

      if(!client){
        list.innerHTML = '<div class="error">Supabase client not found. Check supabaseClient.js.</div>';
        live.textContent = "Error";
        return;
      }

      const { data, error } = await client
        .from("leads")
        .select("*")
        .order("created_at", { ascending:false })
        .limit(300);

      if(error){
        list.innerHTML = `<div class="error">${esc(error.message)}</div>`;
        live.textContent = "Error";
        return;
      }

      state.rows = data || [];
      live.textContent = "Live";
      render();
    }

    document.getElementById("refresh").addEventListener("click", loadLeads);
    document.getElementById("search").addEventListener("input", render);
    document.getElementById("status-filter").addEventListener("change", render);
    document.getElementById("time-filter").addEventListener("change", render);

    document.getElementById("lead-list").addEventListener("change", async function(e){
      const select = e.target.closest("select[data-status]");
      if(!select) return;

      const row = select.closest("[data-id]");
      if(!row) return;

      const client = await waitClient();
      if(!client) return;

      const { error } = await client
        .from("leads")
        .update({ status: select.value })
        .eq("id", row.dataset.id);

      if(error){
        alert(error.message);
        return;
      }

      const item = state.rows.find(x => x.id === row.dataset.id);
      if(item) item.status = select.value;

      render();
    });

    loadLeads();
    setInterval(loadLeads, 60000);
  </script>
</body>
</html>
